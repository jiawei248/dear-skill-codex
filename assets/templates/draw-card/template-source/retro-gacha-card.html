<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro 3D Gacha Machine</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls for 360 rotation -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- GSAP for smooth animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        html, body, #root { width: 100%; height: 100%; }
        body { margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background-color: #020610; }

        /* --- 暗场歌词背景 --- */
        #gradient-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            z-index: 0;
            isolation: isolate;
            background:
                radial-gradient(circle at 18% 22%, rgba(75, 189, 197, 0.08), transparent 30%),
                radial-gradient(circle at 84% 78%, rgba(88, 123, 181, 0.08), transparent 34%),
                linear-gradient(180deg, #050812 0%, #07111d 46%, #030711 100%);
        }

        #gradient-bg::before {
            display: none;
        }

        #gradient-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at 50% 50%, transparent 0 25%, rgba(0, 0, 0, 0.04) 34%, rgba(0, 0, 0, 0.58) 100%),
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.018) 0 1px, transparent 1px 4px);
            opacity: 0.82;
        }

        .orb {
            display: none;
            position: absolute;
            left: 50%;
            top: 50%;
            z-index: 1;
            border-radius: 50%;
            mix-blend-mode: screen;
            pointer-events: none;
            will-change: transform, opacity, filter;
        }

        .orb-1 {
            width: clamp(300px, 45vw, 560px);
            height: clamp(300px, 45vw, 560px);
            background:
                repeating-conic-gradient(
                    from -12deg,
                    rgba(240, 248, 250, 0.96) 0deg 1.05deg,
                    transparent 1.05deg 3.55deg,
                    rgba(184, 205, 211, 0.66) 3.55deg 4.2deg,
                    transparent 4.2deg 6.4deg
                );
            -webkit-mask-image: radial-gradient(circle, transparent 0 53%, rgba(0,0,0,0.52) 53.4% 56.4%, #000 57% 67%, transparent 67.6% 100%);
            mask-image: radial-gradient(circle, transparent 0 53%, rgba(0,0,0,0.52) 53.4% 56.4%, #000 57% 67%, transparent 67.6% 100%);
            opacity: 0.62;
            filter: drop-shadow(0 0 18px rgba(199, 239, 248, 0.22));
            animation: audioWaveOuter 1.7s ease-in-out infinite;
        }

        .orb-2 {
            width: clamp(210px, 29vw, 348px);
            height: clamp(210px, 29vw, 348px);
            border: 1px dashed rgba(234, 243, 245, 0.58);
            opacity: 0.58;
            animation: audioRingBreath 2.7s ease-in-out infinite;
        }

        .orb-3 {
            width: clamp(98px, 13vw, 146px);
            height: clamp(98px, 13vw, 146px);
            border: 1px solid rgba(236, 246, 248, 0.62);
            background:
                radial-gradient(circle, rgba(255, 78, 78, 0.1) 0 11%, transparent 12%),
                radial-gradient(circle, transparent 0 52%, rgba(236, 246, 248, 0.13) 53%, transparent 54%);
            opacity: 0.72;
            animation: audioInnerRing 2.1s ease-in-out infinite;
        }

        .orb-4 {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            background: #ff4f52;
            box-shadow:
                0 0 0 10px rgba(255, 79, 82, 0.04),
                0 0 22px rgba(255, 79, 82, 0.58);
            opacity: 0.95;
            animation: audioCorePulse 1.5s ease-in-out infinite;
        }

        .lyrics-layer {
            position: absolute;
            inset: 0;
            z-index: 12;
            overflow: hidden;
            pointer-events: none;
            mix-blend-mode: normal;
            perspective: 860px;
            perspective-origin: 50% 44%;
            transform-style: preserve-3d;
        }

        .lyric-line {
            position: absolute;
            top: -22vh;
            white-space: nowrap;
            font-weight: 900;
            line-height: 1;
            letter-spacing: 0;
            font-family: "Courier New", Courier, monospace;
            font-size: clamp(32px, var(--lyric-size, 4.5vw), 96px);
            color: rgba(127, 229, 237, 0.78);
            text-shadow:
                0 1px 0 rgba(1, 6, 12, 0.42),
                0 0 8px rgba(87, 226, 213, 0.72),
                0 0 22px rgba(68, 150, 214, 0.56),
                0 0 42px rgba(98, 105, 186, 0.32);
            filter: blur(var(--lyric-depth-blur, 0.15px));
            transform-style: preserve-3d;
            backface-visibility: hidden;
            animation-name: lyricDrop, lyricColorFlow;
            animation-timing-function: linear, ease-in-out;
            animation-iteration-count: infinite, infinite;
            will-change: transform, opacity;
        }

        /* --- 动态音波层 --- */
        #dot-grid-layer {
            position: absolute;
            left: 50%;
            top: 50%;
            width: clamp(360px, 55vw, 660px);
            height: clamp(360px, 55vw, 660px);
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
            border-radius: 50%;
            background:
                repeating-conic-gradient(
                    from 5deg,
                    rgba(232, 244, 248, 0.78) 0deg 0.7deg,
                    transparent 0.7deg 2.4deg,
                    rgba(111, 176, 196, 0.34) 2.4deg 3deg,
                    transparent 3deg 5.2deg
                );
            -webkit-mask-image: radial-gradient(circle, transparent 0 59%, rgba(0,0,0,0.18) 59.4% 61.8%, #000 62.2% 66.2%, transparent 67% 100%);
            mask-image: radial-gradient(circle, transparent 0 59%, rgba(0,0,0,0.18) 59.4% 61.8%, #000 62.2% 66.2%, transparent 67% 100%);
            mix-blend-mode: screen;
            opacity: 0.38;
            filter: drop-shadow(0 0 22px rgba(191, 237, 247, 0.18));
            animation: audioWaveWide 2.2s ease-in-out infinite;
        }

        #dot-grid-layer::before {
            content: '';
            position: absolute;
            inset: 15%;
            border-radius: 50%;
            border: 1px solid rgba(232, 244, 248, 0.24);
            background:
                radial-gradient(circle, transparent 0 48%, rgba(232, 244, 248, 0.14) 49% 49.4%, transparent 50% 100%);
            mix-blend-mode: screen;
            opacity: 0.76;
            animation: audioInnerDash 2.6s ease-in-out infinite;
        }

        .orb,
        #dot-grid-layer {
            display: none;
        }

        .audio-panel {
            position: absolute;
            left: 50%;
            top: 49%;
            z-index: 0;
            width: clamp(640px, 100vmin, 1120px);
            aspect-ratio: 1;
            transform: translate(-50%, -50%);
            background: transparent;
            border: 0;
            box-shadow: none;
            opacity: 0.46;
            pointer-events: none;
            overflow: visible;
        }

        .audio-panel::before {
            display: none;
        }

        .audio-panel-label {
            position: absolute;
            top: 30px;
            z-index: 2;
            font: 700 12px/1 "Courier New", monospace;
            letter-spacing: 2px;
            color: rgba(232, 238, 241, 0.48);
        }

        .audio-panel-label.left { left: 32px; }
        .audio-panel-label.right { right: 32px; }

        .audio-panel-status {
            position: absolute;
            left: 32px;
            right: 32px;
            bottom: 72px;
            z-index: 2;
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            padding-top: 20px;
            color: rgba(255, 255, 255, 0.88);
            font: 500 16px/1.35 "Courier New", "PingFang SC", monospace;
        }

        .audio-panel-status span {
            display: block;
            margin-bottom: 10px;
            font-size: 11px;
            letter-spacing: 2px;
            color: rgba(232, 238, 241, 0.48);
        }

        .audio-panel-footer {
            position: absolute;
            left: 32px;
            right: 32px;
            bottom: 30px;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            font: 700 12px/1 "Courier New", monospace;
            letter-spacing: 1.5px;
            color: rgba(232, 238, 241, 0.44);
        }

        .audio-wave-svg {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 100%;
            transform: translate(-50%, -50%);
            z-index: 0;
            overflow: visible;
            filter:
                drop-shadow(0 0 7px rgba(228, 241, 246, 0.16))
                drop-shadow(0 0 18px rgba(96, 202, 220, 0.1));
        }

        .audio-wave-svg .audio-ring-line {
            fill: none;
            stroke: rgba(235, 242, 244, 0.68);
            stroke-width: 1.7;
        }

        .audio-wave-svg .audio-ring-dashed {
            fill: none;
            stroke: rgba(235, 242, 244, 0.62);
            stroke-width: 1.35;
            stroke-dasharray: 5 8;
            animation: audioDashSpin 9s linear infinite;
            transform-origin: 300px 300px;
        }

        .audio-spoke {
            stroke: rgba(238, 244, 246, 0.92);
            stroke-width: 3.1;
            stroke-linecap: round;
        }

        .audio-core-dot {
            fill: #ff4b50;
            filter: drop-shadow(0 0 10px rgba(255, 75, 80, 0.7));
            animation: audioSvgCorePulse 1.45s ease-in-out infinite;
            transform-origin: 300px 300px;
        }

        @keyframes audioDashSpin {
            to { transform: rotate(360deg); }
        }

        @keyframes audioSvgCorePulse {
            0%, 100% { transform: scale(0.9); opacity: 0.82; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        @keyframes flowBlue {
            0%   {
                transform: translate(-18vw, -10vh) scale(1.05, 0.78) rotate(0deg) skew(-8deg, 2deg);
                background-color: rgba(96, 164, 194, 0.46);
                border-radius: 74% 26% 62% 38% / 42% 66% 34% 58%;
            }
            33%  {
                transform: translate(20vw, 34vh) scale(1.42, 0.84) rotate(84deg) skew(10deg, -6deg);
                background-color: rgba(108, 124, 185, 0.4);
                border-radius: 28% 72% 36% 64% / 68% 36% 64% 32%;
            }
            66%  {
                transform: translate(57vw, -20vh) scale(0.78, 1.48) rotate(172deg) skew(-12deg, 7deg);
                background-color: rgba(96, 184, 170, 0.38);
                border-radius: 64% 36% 72% 28% / 28% 54% 46% 72%;
            }
            100% {
                transform: translate(74vw, 13vh) scale(1.18, 0.72) rotate(360deg) skew(6deg, -8deg);
                background-color: rgba(128, 186, 198, 0.44);
                border-radius: 44% 56% 25% 75% / 54% 24% 76% 46%;
            }
        }

        @keyframes flowTeal {
            0%   {
                transform: translate(84vw, 60vh) scale(0.76, 1.34) rotate(0deg) skew(6deg, -10deg);
                background-color: rgba(101, 184, 169, 0.42);
                border-radius: 40% 60% 70% 30% / 30% 64% 36% 70%;
            }
            33%  {
                transform: translate(36vw, 16vh) scale(1.26, 0.72) rotate(-94deg) skew(-12deg, 5deg);
                background-color: rgba(124, 135, 188, 0.34);
                border-radius: 72% 28% 38% 62% / 46% 76% 24% 54%;
            }
            66%  {
                transform: translate(7vw, 73vh) scale(1.48, 0.9) rotate(-188deg) skew(12deg, -3deg);
                background-color: rgba(91, 182, 144, 0.4);
                border-radius: 24% 76% 66% 34% / 62% 32% 68% 38%;
            }
            100% {
                transform: translate(-15vw, 22vh) scale(0.86, 1.42) rotate(-360deg) skew(-8deg, 9deg);
                background-color: rgba(89, 168, 191, 0.42);
                border-radius: 56% 44% 28% 72% / 26% 48% 52% 74%;
            }
        }

        @keyframes flowPurple {
            0%   {
                transform: translate(29vw, 42vh) scale(1.18, 0.78) rotate(0deg) skew(-10deg, 4deg);
                background-color: rgba(130, 122, 181, 0.34);
                border-radius: 64% 36% 42% 58% / 34% 72% 28% 66%;
            }
            33%  {
                transform: translate(70vw, 79vh) scale(1.42, 0.84) rotate(46deg) skew(8deg, -8deg);
                background-color: rgba(174, 113, 166, 0.3);
                border-radius: 34% 66% 28% 72% / 72% 28% 66% 34%;
            }
            66%  {
                transform: translate(-12vw, 8vh) scale(0.72, 1.48) rotate(138deg) skew(-8deg, 10deg);
                background-color: rgba(94, 159, 190, 0.38);
                border-radius: 78% 22% 54% 46% / 44% 36% 64% 56%;
            }
            100% {
                transform: translate(9vw, 82vh) scale(1.44, 0.82) rotate(360deg) skew(12deg, -6deg);
                background-color: rgba(145, 117, 180, 0.34);
                border-radius: 38% 62% 76% 24% / 64% 42% 58% 36%;
            }
        }

        @keyframes flowMagenta {
            0% {
                transform: translate(58vw, -23vh) scale(0.76, 1.34) rotate(0deg) skew(7deg, -9deg);
                background-color: rgba(168, 106, 147, 0.28);
                border-radius: 26% 74% 54% 46% / 62% 32% 68% 38%;
            }
            45% {
                transform: translate(17vw, 56vh) scale(1.38, 0.82) rotate(112deg) skew(-13deg, 5deg);
                background-color: rgba(185, 161, 116, 0.28);
                border-radius: 72% 28% 30% 70% / 34% 66% 34% 66%;
            }
            100% {
                transform: translate(76vw, 67vh) scale(0.82, 1.42) rotate(260deg) skew(8deg, -10deg);
                background-color: rgba(103, 178, 190, 0.34);
                border-radius: 44% 56% 78% 22% / 72% 30% 70% 28%;
            }
        }

        @keyframes auroraSpin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.08); }
            100% { transform: rotate(360deg) scale(1); }
        }

        @keyframes audioHaloBreath {
            0%, 100% { opacity: 0.54; filter: brightness(0.84); }
            45% { opacity: 0.82; filter: brightness(1.18); }
            68% { opacity: 0.66; filter: brightness(0.98); }
        }

        @keyframes audioWaveOuter {
            0%, 100% {
                transform: translate(-50%, -50%) scale(0.96) rotate(-2deg);
                opacity: 0.46;
                filter: drop-shadow(0 0 14px rgba(199, 239, 248, 0.16)) brightness(0.9);
            }
            28% {
                transform: translate(-50%, -50%) scale(1.04, 1.0) rotate(2deg);
                opacity: 0.72;
                filter: drop-shadow(0 0 28px rgba(199, 239, 248, 0.28)) brightness(1.2);
            }
            56% {
                transform: translate(-50%, -50%) scale(1.01, 1.08) rotate(-1deg);
                opacity: 0.6;
                filter: drop-shadow(0 0 20px rgba(199, 239, 248, 0.2)) brightness(1.03);
            }
        }

        @keyframes audioWaveWide {
            0%, 100% {
                transform: translate(-50%, -50%) scale(0.98) rotate(0deg);
                opacity: 0.26;
            }
            35% {
                transform: translate(-50%, -50%) scale(1.07, 1.02) rotate(3deg);
                opacity: 0.5;
            }
            70% {
                transform: translate(-50%, -50%) scale(1.02, 1.08) rotate(-2deg);
                opacity: 0.34;
            }
        }

        @keyframes audioRingBreath {
            0%, 100% {
                transform: translate(-50%, -50%) scale(0.98);
                opacity: 0.38;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.03);
                opacity: 0.68;
            }
        }

        @keyframes audioInnerRing {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.54;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.08);
                opacity: 0.84;
            }
        }

        @keyframes audioCorePulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(0.9);
                filter: brightness(0.9);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                filter: brightness(1.28);
            }
        }

        @keyframes audioInnerDash {
            0%, 100% {
                transform: scale(0.98) rotate(0deg);
                opacity: 0.44;
            }
            50% {
                transform: scale(1.05) rotate(4deg);
                opacity: 0.82;
            }
        }

        @keyframes lyricDrop {
            0% { transform: translate3d(-5vw, -24vh, var(--lyric-z, 0px)) rotateX(var(--lyric-tilt-x, 0deg)) rotateZ(-4deg) scale(var(--lyric-depth-scale, 1)); opacity: 0; }
            9% { opacity: 0.52; }
            38% { opacity: 0.88; }
            72% { opacity: 0.68; }
            100% { transform: translate3d(4vw, 126vh, var(--lyric-z, 0px)) rotateX(var(--lyric-tilt-x, 0deg)) rotateZ(3deg) scale(var(--lyric-depth-scale, 1)); opacity: 0; }
        }

        @keyframes lyricColorFlow {
            0%, 100% {
                color: rgba(127, 229, 237, 0.78);
                text-shadow:
                    0 1px 0 rgba(1, 6, 12, 0.42),
                    0 0 8px rgba(87, 226, 213, 0.72),
                    0 0 22px rgba(68, 150, 214, 0.56),
                    0 0 42px rgba(98, 105, 186, 0.32);
            }
            24% {
                color: rgba(162, 207, 238, 0.74);
                text-shadow:
                    0 1px 0 rgba(1, 6, 12, 0.42),
                    0 0 8px rgba(129, 201, 232, 0.68),
                    0 0 24px rgba(81, 136, 207, 0.48),
                    0 0 44px rgba(120, 112, 188, 0.28);
            }
            52% {
                color: rgba(144, 230, 198, 0.74);
                text-shadow:
                    0 1px 0 rgba(1, 6, 12, 0.42),
                    0 0 9px rgba(116, 220, 192, 0.66),
                    0 0 25px rgba(71, 163, 173, 0.48),
                    0 0 46px rgba(83, 118, 184, 0.28);
            }
            78% {
                color: rgba(201, 178, 226, 0.66);
                text-shadow:
                    0 1px 0 rgba(1, 6, 12, 0.42),
                    0 0 9px rgba(190, 164, 218, 0.54),
                    0 0 24px rgba(128, 108, 183, 0.36),
                    0 0 42px rgba(66, 139, 181, 0.24);
            }
        }

        @keyframes dotDrift {
            0% { background-position: 0 0, 0 0; }
            100% { background-position: 44px 88px, -44px 44px; }
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.45; filter: brightness(0.78); }
            45% { opacity: 0.72; filter: brightness(1.28); }
            62% { opacity: 0.54; filter: brightness(0.96); }
        }

        @keyframes dotWaveBands {
            0% {
                background-position: 0 0;
                -webkit-mask-position: -180px 180px;
                mask-position: -180px 180px;
            }
            100% {
                background-position: 44px 44px;
                -webkit-mask-position: 180px -180px;
                mask-position: 180px -180px;
            }
        }

        @keyframes dotBandPulse {
            0%, 100% { opacity: 0.12; filter: brightness(0.9); }
            40% { opacity: 0.58; filter: brightness(1.75); }
            72% { opacity: 0.28; filter: brightness(1.1); }
        }

        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }

        /* 扫描线效果增加复古感 */
        .scanlines {
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.03) 50%,
                rgba(0,0,0,0.03)
            );
            background-size: 100% 4px;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 5;
        }

        .wish-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            overflow: auto;
            padding: 24px 18px;
            background:
                radial-gradient(circle at 50% 58%, rgba(82, 166, 190, 0.1), transparent 30%),
                rgba(0, 4, 12, 0.38);
            backdrop-filter: blur(1.5px);
        }

        .wish-card-panel {
            --wish-target-x: 180px;
            --wish-target-y: 260px;
            width: min(560px, calc(100vw - 36px));
            max-height: calc(100vh - 48px);
            position: relative;
            overflow: auto;
            border-radius: 7px;
            border: 2px solid rgba(116, 159, 183, 0.86);
            background:
                linear-gradient(180deg, rgba(204, 225, 234, 0.98), rgba(148, 184, 202, 0.98)),
                repeating-linear-gradient(0deg, rgba(4, 19, 32, 0.04) 0 1px, transparent 1px 4px);
            box-shadow:
                inset 2px 2px 0 rgba(235, 251, 255, 0.78),
                inset -3px -5px 0 rgba(64, 103, 128, 0.28),
                0 24px 70px rgba(0, 0, 0, 0.52);
            color: #0b2030;
            transform-origin: center;
            scrollbar-width: thin;
            scrollbar-color: #2a6b86 #b7d2df;
        }

        .wish-card-panel::-webkit-scrollbar { width: 10px; }
        .wish-card-panel::-webkit-scrollbar-track { background: #b7d2df; }
        .wish-card-panel::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #4fa3b7, #1c4e6d);
            border: 2px solid #b7d2df;
        }

        .wish-card-panel::before {
            content: '';
            position: absolute;
            inset: 42px 10px 10px;
            border-radius: 5px;
            border: 1px solid rgba(17, 64, 90, 0.26);
            pointer-events: none;
        }

        .wish-card-panel::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(110deg, transparent 0 35%, rgba(255, 255, 255, 0.32) 46%, transparent 58%),
                repeating-linear-gradient(90deg, rgba(0, 70, 92, 0.08) 0 1px, transparent 1px 7px);
            mix-blend-mode: soft-light;
        }

        .wish-card-panel.is-delivering {
            animation: wishPanelVanish 0.42s ease-out forwards;
            pointer-events: none;
        }

        .wish-panel-inner {
            position: relative;
            z-index: 1;
            padding: 0;
        }

        .wish-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            margin: 0;
            min-height: 42px;
            padding: 8px 10px 8px 16px;
            border-bottom: 2px solid rgba(5, 24, 38, 0.68);
            background:

                const data = imageDataUrl.slice(commaIndex + 1);
                const mimeMatch = meta.match(/data:([^;]+)/);

                const binary = meta.includes(';base64') ? atob(data) : decodeURIComponent(data);

                shape.quadraticCurveTo(x, y + height, x + radius, y + height);

                shape.quadraticCurveTo(x + width, y + height, x + width, y + height - radius);
                shape.lineTo(x + width, y + radius);
                shape.quadraticCurveTo(x + width, y, x + width - radius, y);

                let sw = image.naturalWidth;
                let sh = image.naturalHeight;

                if (sourceRatio > targetRatio) {

                } else {
                    sh = image.naturalWidth / targetRatio;

            updateWishButtonTexture() {
                if (!this.wishButtonCtx || !this.wishButtonTexture) return;

                const canvas = this.wishButtonCanvas;
                const ctx = this.wishButtonCtx;
                const screenX = 30;
                const screenY = 24;
                const screenW = canvas.width - 60;
                const screenH = canvas.height - 48;
                const screenR = 16;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                const screen = ctx.createLinearGradient(0, screenY, 0, screenY + screenH);
                screen.addColorStop(0, '#050c13');
                screen.addColorStop(0.45, '#071522');
                screen.addColorStop(1, '#03080e');
                ctx.fillStyle = screen;
                this.drawCanvasRoundedRect(ctx, screenX, screenY, screenW, screenH, screenR);
                ctx.fill();

                ctx.save();
                this.drawCanvasRoundedRect(ctx, screenX, screenY, screenW, screenH, screenR);
                ctx.clip();

                ctx.fillStyle = 'rgba(91, 234, 219, 0.16)';
                for (let x = screenX + 8; x < screenX + screenW - 8; x += 6) {
                    ctx.fillRect(x, screenY + 8, 1, screenH - 16);
                }
                for (let y = screenY + 8; y < screenY + screenH - 8; y += 6) {
                    ctx.fillRect(screenX + 8, y, screenW - 16, 1);
                }

                ctx.fillStyle = 'rgba(1, 5, 9, 0.34)';
                for (let y = screenY; y < screenY + screenH; y += 5) {
                    ctx.fillRect(screenX, y, screenW, 2);
                }

                const glow = ctx.createRadialGradient(canvas.width * 0.48, canvas.height * 0.52, 18, canvas.width * 0.48, canvas.height * 0.52, 220);
                glow.addColorStop(0, 'rgba(83, 242, 227, 0.16)');
                glow.addColorStop(1, 'rgba(83, 242, 227, 0)');
                ctx.fillStyle = glow;
                ctx.fillRect(screenX, screenY, screenW, screenH);

                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = '900 74px "Courier New", "PingFang SC", "Microsoft YaHei", sans-serif';
                ctx.shadowColor = 'rgba(83, 242, 227, 0.88)';
                ctx.shadowBlur = 14;
                ctx.fillStyle = '#9ff1e5';

                const text = WISH_COPY.machineButton;
                const textWidth = ctx.measureText(text).width;
                const spacing = 110;
                const loopWidth = textWidth + spacing;
                const baseY = canvas.height / 2 + 4;

                ctx.fillText(text, this.wishButtonTextOffsetX, baseY);
                ctx.fillText(text, this.wishButtonTextOffsetX + loopWidth, baseY);

                this.wishButtonTextOffsetX -= 1.35;
                if (this.wishButtonTextOffsetX <= -loopWidth) {
                    this.wishButtonTextOffsetX += loopWidth;
                }

                ctx.shadowBlur = 0;
                ctx.restore();

                this.wishButtonTexture.needsUpdate = true;
            }

            drawPixelPhoto(image, x, y, width, height) {
                const lowWidth = 210;
                const lowHeight = 196;
                if (this.pixelCanvas.width !== lowWidth || this.pixelCanvas.height !== lowHeight) {
                    this.pixelCanvas.width = lowWidth;
                    this.pixelCanvas.height = lowHeight;
                }

                this.pixelCtx.clearRect(0, 0, lowWidth, lowHeight);
                this.pixelCtx.imageSmoothingEnabled = true;
                this.pixelCtx.filter = 'contrast(1.12) saturate(1.05) brightness(1.04)';
                this.drawImageCover(this.pixelCtx, image, 0, 0, lowWidth, lowHeight);
                this.pixelCtx.filter = 'none';

                const ctx = this.carouselCtx;
                ctx.save();
                ctx.beginPath();
                ctx.rect(x, y, width, height);
                ctx.clip();
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(this.pixelCanvas, x, y, width, height);

                ctx.globalCompositeOperation = 'screen';
                ctx.fillStyle = 'rgba(47, 219, 255, 0.13)';
                ctx.fillRect(x, y, width, height);

                ctx.globalCompositeOperation = 'soft-light';
                ctx.fillStyle = 'rgba(0, 181, 255, 0.24)';
                ctx.fillRect(x, y, width, height);

                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = 'rgba(198, 246, 255, 0.13)';
                for (let yLine = y; yLine < y + height; yLine += 8) {
                    ctx.fillRect(x, yLine, width, 1);
                }

                ctx.fillStyle = 'rgba(0, 18, 54, 0.16)';
                for (let yLine = y + 4; yLine < y + height; yLine += 8) {
                    ctx.fillRect(x, yLine, width, 1);
                }

                ctx.fillStyle = 'rgba(132, 235, 255, 0.08)';
                for (let xLine = x; xLine < x + width; xLine += 14) {
                    ctx.fillRect(xLine, y, 1, height);
                }

                const vignette = ctx.createRadialGradient(x + width / 2, y + height / 2, width * 0.2, x + width / 2, y + height / 2, width * 0.68);
                vignette.addColorStop(0, 'rgba(255, 255, 255, 0)');
                vignette.addColorStop(1, 'rgba(0, 12, 42, 0.32)');
                ctx.fillStyle = vignette;
                ctx.fillRect(x, y, width, height);
                ctx.restore();
            }

            updateScreenCarousel(now = performance.now()) {
                if (!this.carouselCtx || !this.carouselTexture) return;

                const ctx = this.carouselCtx;
                const width = this.carouselCanvas.width;
                const height = this.carouselCanvas.height;
                const time = now * 0.001;
                const radius = 54;

                ctx.clearRect(0, 0, width, height);

                const loaded = (this.carouselImages || []).filter(item => item.loaded);
                const imageX = 0;
                const imageY = 0;
                const imageW = width;
                const imageH = height;

                ctx.save();
                this.drawCanvasRoundedRect(ctx, 0, 0, width, height, radius);
                ctx.clip();

                const bg = ctx.createLinearGradient(0, 0, width, height);
                bg.addColorStop(0, '#061827');
                bg.addColorStop(0.45, '#0c4c78');
                bg.addColorStop(1, '#07131f');
                ctx.fillStyle = bg;
                ctx.fillRect(0, 0, width, height);

                if (loaded.length) {
                    const holdDuration = 1450;
                    const transitionDuration = 2050;
                    const cycleDuration = holdDuration + transitionDuration;
                    const elapsed = now - this.carouselStartTime;
                    const currentIndex = Math.floor(elapsed / cycleDuration) % loaded.length;
                    const nextIndex = (currentIndex + 1) % loaded.length;
                    const phaseTime = elapsed % cycleDuration;

                    if (phaseTime < holdDuration) {
                        this.drawPixelPhoto(loaded[currentIndex].image, imageX, imageY, imageW, imageH);
                    } else {
                        const progress = this.easeInOutCubic((phaseTime - holdDuration) / transitionDuration);
                        const travel = imageW;
                        this.drawPixelPhoto(loaded[currentIndex].image, imageX - progress * travel, imageY, imageW, imageH);
                        this.drawPixelPhoto(loaded[nextIndex].image, imageX + (1 - progress) * travel, imageY, imageW, imageH);
                    }
                } else {
                    ctx.fillStyle = 'rgba(92, 208, 255, 0.18)';
                    for (let y = imageY; y < imageY + imageH; y += 12) {
                        ctx.fillRect(imageX, y, imageW, 3);
                    }
                }

                const glowX = (Math.sin(time * 1.8) * 0.5 + 0.5) * width;
                const glow = ctx.createRadialGradient(glowX, height * 0.36, 20, glowX, height * 0.36, 260);
                glow.addColorStop(0, 'rgba(167, 247, 255, 0.2)');
                glow.addColorStop(1, 'rgba(167, 247, 255, 0)');
                ctx.fillStyle = glow;
                ctx.fillRect(0, 0, width, height);

                ctx.fillStyle = 'rgba(0, 8, 20, 0.22)';
                for (let y = 0; y < height; y += 6) {
                    ctx.fillRect(0, y, width, 1.5);
                }

                ctx.fillStyle = 'rgba(130, 236, 255, 0.07)';
                for (let x = 0; x < width; x += 14) ctx.fillRect(x, 0, 1, height);

                ctx.strokeStyle = 'rgba(155, 242, 255, 0.32)';
                ctx.lineWidth = 2;
                this.drawCanvasRoundedRect(ctx, 10, 10, width - 20, height - 20, radius - 10);
                ctx.stroke();

                ctx.fillStyle = 'rgba(220, 249, 255, 0.16)';
                ctx.beginPath();
                ctx.moveTo(width * 0.1, 24);
                ctx.lineTo(width * 0.9, 24);
                ctx.lineTo(width * 0.7, 96);
                ctx.lineTo(width * 0.04, 120);
                ctx.closePath();
                ctx.fill();
                ctx.restore();

                this.carouselTexture.needsUpdate = true;
            }

            buildMachine() {
                const bodyWidth = 4.0;
                const bodyHeight = 5.5;
                const bodyDepth = 3.5;
                const cornerRadius = 0.4;

                const bodyShape = this.createRoundedRectShape(bodyWidth, bodyHeight, cornerRadius);
                const extrudeSettings = {
                    depth: bodyDepth,
                    bevelEnabled: true,
                    bevelSegments: 4,
                    steps: 2,
                    bevelSize: 0.05,
                    bevelThickness: 0.05
                };
                const bodyGeo = new THREE.ExtrudeGeometry(bodyShape, extrudeSettings);
                bodyGeo.translate(0, 0, -bodyDepth/2);

                this.body = new THREE.Mesh(bodyGeo, this.matBody);
                this.body.castShadow = true;
                this.body.receiveShadow = true;
                this.machineGroup.add(this.body);

                const screenWidth = 3.0;
                const screenHeight = 2.8;
                const screenRadius = 0.2;

                const screenShape = this.createRoundedRectShape(screenWidth, screenHeight, screenRadius);
                const screenGeo = new THREE.ExtrudeGeometry(screenShape, { depth: 0.1, bevelEnabled: true, bevelSize: 0.02, bevelThickness: 0.02 });
                screenGeo.translate(0, 0, 0);

                this.screen = new THREE.Mesh(screenGeo, this.matScreen);
                this.screen.position.set(0, 0.8, bodyDepth/2 + 0.01);
                this.machineGroup.add(this.screen);
                this.createScreenCarousel(screenWidth, screenHeight, bodyDepth);

                this.buildTopSignBoard(bodyWidth, bodyHeight, bodyDepth);

                const knobRadius = 0.8;
                const knobDepth = 0.5;
                const knobGeo = new THREE.CylinderGeometry(knobRadius, knobRadius, knobDepth, 8);
                this.knob = new THREE.Mesh(knobGeo, this.matBlueHardware);
                this.knob.rotation.z = Math.PI / 2;
                this.knob.position.set(bodyWidth/2 + knobDepth/2 - 0.05, -1.2, 0);
                this.knob.castShadow = true;
                this.machineGroup.add(this.knob);

                const knobIndicatorGeo = new THREE.BoxGeometry(0.2, 0.2, 0.4);
                const knobIndicator = new THREE.Mesh(knobIndicatorGeo, this.matBlueDark);
                knobIndicator.position.set(0, knobRadius - 0.1, 0);
                this.knob.add(knobIndicator);
                this.buildKnobSurfaceArrow(knobRadius, knobDepth);

                const bevelThickness = 0.05;
                const bumpWidth = bodyWidth - (bevelThickness * 2);
                const bumpHeight = 1.6;
                const bumpDepth = 1.4;
                const slantHeight = 0.7;

                const br = 0.15;
                const bumpShape = new THREE.Shape();
                bumpShape.moveTo(0, 0);
                bumpShape.lineTo(bumpDepth - br, 0);

                bumpShape.quadraticCurveTo(bumpDepth, 0, bumpDepth, br);
                bumpShape.lineTo(bumpDepth, slantHeight - br);

                const slantDx = -bumpDepth;
                const slantDy = bumpHeight - slantHeight;
                const slantLen = Math.sqrt(slantDx * slantDx + slantDy * slantDy);
                const uX = slantDx / slantLen;
                const uY = slantDy / slantLen;
                const endX = bumpDepth + uX * br;
                const endY = slantHeight + uY * br;

                bumpShape.quadraticCurveTo(bumpDepth, slantHeight, endX, endY);
                bumpShape.lineTo(0, bumpHeight);
                bumpShape.lineTo(0, 0);

                const bumpExtrudeSettings = {
                    depth: bumpWidth,
                    bevelEnabled: true,
                    bevelSegments: 4,
                    steps: 1,
                    bevelSize: bevelThickness,
                    bevelThickness: bevelThickness
                };

                const bumpGeo = new THREE.ExtrudeGeometry(bumpShape, bumpExtrudeSettings);
                bumpGeo.rotateY(-Math.PI / 2);
                bumpGeo.translate(bumpWidth / 2, -bumpHeight / 2, 0);

                const bumpMesh = new THREE.Mesh(bumpGeo, this.matBody);
                bumpMesh.position.set(0, -bodyHeight/2 + bumpHeight/2, bodyDepth/2 - 0.05);
                bumpMesh.castShadow = true;
                bumpMesh.receiveShadow = true;
                this.machineGroup.add(bumpMesh);
                this.buildSlopeEasonLogo();

                const matHole = new THREE.MeshBasicMaterial({ color: 0x050505 });

                const slotWidth = 2.8;
                const slotHeight = 0.12;
                const slotY = -bodyHeight/2 + bumpHeight + 0.15;
                const slotZ = bodyDepth/2 + 0.05;

                const slotHoleGeo = new THREE.BoxGeometry(slotWidth, slotHeight, 0.2);
                const slotHole = new THREE.Mesh(slotHoleGeo, matHole);
                slotHole.position.set(0, slotY, slotZ);
                this.machineGroup.add(slotHole);

                const slotFrameGeo = new THREE.BoxGeometry(slotWidth + 0.15, slotHeight + 0.1, 0.1);
                const slotFrame = new THREE.Mesh(slotFrameGeo, this.matKnob);
                slotFrame.position.set(0, slotY, slotZ - 0.05);
                this.machineGroup.add(slotFrame);

                const insertSlotWidth = 1.0;
                const insertSlotHeight = 0.08;
                const insertY = -bodyHeight/2 + slantHeight / 2;
                const insertZ = bodyDepth/2 - 0.05 + bumpDepth + 0.05;

                const insertHoleGeo = new THREE.BoxGeometry(insertSlotWidth, insertSlotHeight, 0.2);
                const insertHole = new THREE.Mesh(insertHoleGeo, matHole);
                insertHole.position.set(bumpWidth/4, insertY, insertZ);
                this.machineGroup.add(insertHole);
                this.wishInsertSlot = insertHole;

                const insertBaseGeo = new THREE.BoxGeometry(insertSlotWidth + 0.15, insertSlotHeight + 0.1, 0.1);
                const insertBase = new THREE.Mesh(insertBaseGeo, this.matKnob);
                insertBase.position.set(bumpWidth/4, insertY, insertZ - 0.05);
                this.machineGroup.add(insertBase);

                this.buildWishButton(insertY, insertZ);
                this.buildCard(bodyDepth, slotY);
                this.buildSideStickerCollage(bodyWidth, bodyHeight, bodyDepth);
            }

            createKnobArrowTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');
                const cx = 256;
                const cy = 256;
                const radius = 158;
                const start = -Math.PI * 0.78;
                const end = Math.PI * 0.86;
                const endX = cx + Math.cos(end) * radius;
                const endY = cy + Math.sin(end) * radius;
                const tangent = end + Math.PI / 2;

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.shadowColor = 'rgba(125, 255, 240, 0.96)';
                ctx.shadowBlur = 24;
                ctx.strokeStyle = 'rgba(250, 255, 252, 0.96)';
                ctx.lineWidth = 34;
                ctx.beginPath();
                ctx.arc(cx, cy, radius, start, end, false);
                ctx.stroke();

                ctx.fillStyle = 'rgba(250, 255, 252, 0.98)';
                ctx.beginPath();
                ctx.moveTo(endX + Math.cos(tangent) * 42, endY + Math.sin(tangent) * 42);
                ctx.lineTo(endX + Math.cos(tangent + 2.45) * 36, endY + Math.sin(tangent + 2.45) * 36);
                ctx.lineTo(endX + Math.cos(tangent - 2.45) * 36, endY + Math.sin(tangent - 2.45) * 36);
                ctx.closePath();
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(52, 233, 222, 0.78)';
                ctx.lineWidth = 9;
                ctx.beginPath();
                ctx.arc(cx, cy, radius, start, end, false);
                ctx.stroke();

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.68)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(cx, cy, radius - 21, start + 0.18, end - 0.3, false);
                ctx.stroke();

                const texture = new THREE.CanvasTexture(canvas);
                texture.encoding = THREE.sRGBEncoding;
                texture.magFilter = THREE.LinearFilter;
                texture.minFilter = THREE.LinearFilter;
                return texture;
            }

            async createOutlinedStickerTexture(source) {
                const image = await this.loadCardAsset(source);
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');
                const ratio = image.naturalWidth && image.naturalHeight
                    ? image.naturalWidth / image.naturalHeight
                    : 1;
                const maxSize = 352;
                const drawWidth = ratio >= 1 ? maxSize : maxSize * ratio;
                const drawHeight = ratio >= 1 ? maxSize / ratio : maxSize;
                const x = (canvas.width - drawWidth) / 2;
                const y = (canvas.height - drawHeight) / 2;

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.shadowColor = 'rgba(3, 12, 24, 0.22)';
                ctx.shadowBlur = 16;
                ctx.shadowOffsetY = 8;
                ctx.filter = 'brightness(0) invert(1)';
                for (let index = 0; index < 28; index++) {
                    const angle = (Math.PI * 2 * index) / 28;
                    const offset = index % 2 === 0 ? 13 : 8;
                    ctx.drawImage(image, x + Math.cos(angle) * offset, y + Math.sin(angle) * offset, drawWidth, drawHeight);
                }
                ctx.filter = 'none';
                ctx.shadowBlur = 10;
                ctx.shadowOffsetY = 4;
                ctx.drawImage(image, x, y, drawWidth, drawHeight);

                const texture = new THREE.CanvasTexture(canvas);
                texture.encoding = THREE.sRGBEncoding;
                texture.magFilter = THREE.LinearFilter;
                texture.minFilter = THREE.LinearFilter;
                return texture;
            }

            updateSignText() {

                ctx.fillStyle = '#050505';

                const text = 'Eason许愿抽卡机';

                const spacing = 100;

                ctx.fillText(text, this.signTextOffsetX, 64);

                ctx.shadowBlur = 0;

                this.signTextOffsetX -= 1.5;

            loadCardAsset(src) {
                if (!this.assetCache) this.assetCache = new Map();
                const source = String(src || '').trim();
                if (!source) return Promise.reject(new Error('Missing card asset source'));
                if (this.assetCache.has(source)) return this.assetCache.get(source);

                const loadSingleAsset = (url) => new Promise((resolve, reject) => {
                    const image = new Image();
                    image.decoding = 'async';
                    image.loading = 'eager';
                    const timer = window.setTimeout(() => reject(new Error(`Timed out loading ${url}`)), 9000);
                    image.onload = () => {
                        window.clearTimeout(timer);
                        resolve(image);
                    };
                    image.onerror = () => {
                        window.clearTimeout(timer);
                        reject(new Error(`Failed to load ${url}`));
                    };
                    image.src = url;
                });

                const pathEncoded = source
                    .split('/')
                    .map(part => encodeURIComponent(part))
                    .join('/');
                const candidates = [...new Set([source, encodeURI(source), pathEncoded])];
                const promise = candidates
                    .reduce((chain, candidate) => chain.catch(() => loadSingleAsset(candidate)), Promise.reject())
                    .catch(error => {
                        this.assetCache.delete(source);
                        throw error;
                    });

                this.assetCache.set(source, promise);
                return promise;
            }

            async loadFirstAvailableAsset(sources) {
                for (const source of sources.filter(Boolean)) {
                    try {
                        return await this.loadCardAsset(source);
                    } catch (error) {}
                }
                return null;
            }

            drawDecorSticker(ctx, image, x, y, size, rotation = 0, alpha = 0.86) {
                if (!image) return;
                ctx.save();

                ctx.translate(x, y);

                ctx.drawImage(image, -size / 2, -size / 2, size, size);

            drawDecorImage(ctx, image, x, y, size, rotation = 0, alpha = 0.62) {
                if (!image) return;
                const ratio = image.naturalWidth && image.naturalHeight
                    ? image.naturalWidth / image.naturalHeight
                    : 1;
                const drawWidth = ratio >= 1 ? size : size * ratio;
                const drawHeight = ratio >= 1 ? size / ratio : size;

                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.translate(x, y);
                ctx.rotate(rotation);
                ctx.shadowColor = 'rgba(0, 0, 0, 0.12)';
                ctx.shadowBlur = 7;
                ctx.shadowOffsetY = 3;
                ctx.drawImage(image, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
                ctx.restore();
            }

            drawPaperGrain(ctx, x, y, width, height, seed = 0, dark = false) {
                ctx.save();
                ctx.beginPath();
                ctx.rect(x, y, width, height);
                ctx.clip();

                ctx.globalAlpha = dark ? 0.09 : 0.12;
                ctx.fillStyle = dark ? '#fff8ea' : '#111827';
                for (let i = 0; i < 900; i++) {
                    const px = x + ((seed + i * 37) % width);
                    const py = y + ((seed * 5 + i * 53) % height);
                    const size = i % 7 === 0 ? 1.4 : 0.8;
                    ctx.fillRect(px, py, size, size);
                }

                ctx.globalAlpha = dark ? 0.07 : 0.1;
                ctx.strokeStyle = dark ? '#fff8ea' : '#25313d';
                ctx.lineWidth = 0.7;
                for (let lineY = y + 5; lineY < y + height; lineY += 9) {
                    ctx.beginPath();
                    ctx.moveTo(x, lineY + ((seed + lineY) % 3) * 0.3);
                    ctx.lineTo(x + width, lineY + ((seed + lineY) % 5) * 0.22);
                    ctx.stroke();
                }

                ctx.globalAlpha = dark ? 0.05 : 0.07;
                for (let lineX = x + 3; lineX < x + width; lineX += 13) {
                    ctx.beginPath();
                    ctx.moveTo(lineX, y);
                    ctx.lineTo(lineX + ((seed + lineX) % 4) * 0.18, y + height);

                }
                ctx.restore();

            drawPressedLeafSticker(ctx, x, y, size, rotation, theme, dark = false, alpha = 0.42) {
                const leafColor = blendRgb(theme, dark ? { r: 255, g: 248, b: 236 } : { r: 31, g: 45, b: 58 }, dark ? 0.46 : 0.3);
                const paperTint = dark ? 'rgba(255, 248, 236, 0.3)' : 'rgba(255, 252, 244, 0.48)';
                const strokeColor = rgbToCss(leafColor, dark ? 0.74 : 0.66);

                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rotation);
                ctx.globalAlpha = alpha;

                ctx.shadowColor = 'rgba(0, 0, 0, 0.08)';

                this.drawCanvasRoundedRect(ctx, -size * 0.56, -size * 0.34, size * 1.12, size * 0.68, 5);

                this.drawCanvasRoundedRect(ctx, -size * 0.56, -size * 0.34, size * 1.12, size * 0.68, 5);

                    ctx.bezierCurveTo(size * leaf.scale * 0.48, size * leaf.scale * 0.18, size * leaf.scale * 0.16, size * leaf.scale * 0.24, 0, 0);

            drawTemplatePhotoOverlay(ctx, layout, width, height, theme, seed = 0, template = null) {
