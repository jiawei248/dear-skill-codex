<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blue Bouquet</title>
  <style>
    @font-face {
      font-family: "BouquetHand";
      src: url("fonts/荷塘月色手写体+Regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      color-scheme: light;
      --ink: #17375e;
      --blue: #1f63c7;
      --blue-2: #7db8ff;
      --paper: #fbfdff;
      --silk: #1b56b9;
      --soft-shadow: 0 22px 70px rgba(37, 93, 168, .18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      position: relative;
      background: #fff;
      font-family: ui-serif, "Songti SC", "STSong", "Noto Serif CJK SC", Georgia, serif;
      color: var(--ink);
    }

    #halo {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      mix-blend-mode: normal;
      opacity: 1;
      z-index: 1;
    }

    .app {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      isolation: isolate;
      z-index: 2;
    }

    .palette {
      position: fixed;
      left: 22px;
      top: 50%;
      width: 226px;
      max-height: calc(100vh - 52px);
      padding: 14px;
      transform: translateY(-50%);
      z-index: 180;
      color: #1d4677;
      border: 1px solid rgba(54, 114, 189, .16);
      border-radius: 18px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .7), rgba(235, 247, 255, .54)),
        radial-gradient(circle at 18% 12%, rgba(255, 255, 255, .92), transparent 32%);
      box-shadow: 0 18px 44px rgba(35, 87, 154, .13);
      backdrop-filter: blur(18px);
    }

    .palette-title {
      margin: 2px 2px 10px;
      font: 700 13px/1.2 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      letter-spacing: .16em;
      color: rgba(22, 66, 116, .76);
    }

    .palette-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 10px;
      padding: 4px;
      border: 1px solid rgba(53, 113, 190, .12);
      border-radius: 14px;
      background: rgba(226, 241, 255, .42);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .62);
    }

    .palette-tab {
      min-height: 30px;
      border: 0;
      border-radius: 10px;
      color: rgba(30, 77, 132, .68);
      background: transparent;
      cursor: pointer;
      font: 700 13px/1 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      transition: color .16s ease, background .16s ease, box-shadow .16s ease;
    }

    .palette-tab[aria-selected="true"] {
      color: #1d4677;
      background: rgba(255, 255, 255, .82);
      box-shadow:
        0 8px 18px rgba(42, 103, 180, .1),
        inset 0 1px 0 rgba(255, 255, 255, .86);
    }

    .palette-panel[hidden] {
      display: none;
    }

    .palette-list {
      display: grid;
      gap: 8px;
      max-height: calc(100vh - 122px);
      overflow: auto;
      padding-right: 2px;
    }

    .palette-item {
      width: 100%;
      min-height: 52px;
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) auto auto;
      gap: 10px;
      align-items: center;
      padding: 7px 9px 7px 7px;
      border: 1px solid rgba(49, 113, 190, .13);
      border-radius: 14px;
      color: #1d4677;
      background: rgba(255, 255, 255, .48);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .65);
      cursor: pointer;
      font: 600 13px/1.25 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      text-align: left;
      transition: transform .16s ease, background .16s ease, box-shadow .16s ease;
    }

    .palette-item:hover {
      transform: translateX(3px);
      background: rgba(255, 255, 255, .82);
      box-shadow:
        0 10px 24px rgba(38, 101, 178, .13),
        inset 0 1px 0 rgba(255, 255, 255, .76);
    }

    .palette-thumb {
      width: 38px;
      height: 38px;
      object-fit: contain;
      filter: drop-shadow(0 4px 7px rgba(32, 78, 132, .12));
    }

    .palette-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .palette-count {
      min-width: 26px;
      padding: 3px 7px;
      border-radius: 999px;
      color: #2464b6;
      background: rgba(220, 239, 255, .78);
      font-size: 12px;
      text-align: center;
    }

    .palette-outline {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      padding: 0;
      border: 1px solid rgba(58, 126, 205, .16);
      border-radius: 50%;
      color: rgba(23, 84, 169, .82);
      background:
        radial-gradient(circle at 32% 24%, rgba(255, 255, 255, .9), transparent 42%),
        linear-gradient(135deg, rgba(236, 248, 255, .86), rgba(198, 227, 255, .58));
      cursor: pointer;
      font: 800 13px/1 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .78);
    }

    .palette-outline:hover {
      color: rgba(8, 67, 166, .98);
      background:
        radial-gradient(circle at 32% 24%, #fff, transparent 42%),
        linear-gradient(135deg, rgba(222, 244, 255, .96), rgba(152, 202, 255, .72));
    }

    .gem-palette-item {
      grid-template-columns: 42px minmax(0, 1fr) auto;
      min-height: 56px;
    }

    .gem-palette-item.is-active {
      border-color: rgba(22, 94, 200, .42);
      color: #113f8f;
      background:
        radial-gradient(circle at 24% 20%, rgba(255, 255, 255, .94), transparent 38%),
        linear-gradient(135deg, rgba(230, 246, 255, .94), rgba(202, 228, 255, .72));
      box-shadow:
        0 12px 28px rgba(34, 101, 188, .18),
        0 0 0 3px rgba(73, 144, 232, .13),
        inset 0 1px 0 rgba(255, 255, 255, .8);
    }

    .gem-thumb {
      width: 42px;
      height: 42px;
      object-fit: contain;
      filter:
        drop-shadow(0 5px 9px rgba(15, 70, 150, .18))
        drop-shadow(0 0 8px rgba(130, 206, 255, .18));
    }

    .gem-layer {
      position: fixed;
      inset: 0;
      z-index: 170;
      pointer-events: none;
    }

    .placed-gem {
      position: absolute;
      left: var(--gem-x);
      top: var(--gem-y);
      width: var(--gem-w);
      z-index: var(--gem-z);
      transform:
        translate(-50%, -50%)
        rotate(var(--gem-r))
        scale(var(--gem-scale));
      transform-origin: 50% 50%;
      opacity: var(--gem-opacity, .96);
      filter:
        drop-shadow(0 10px 16px rgba(16, 73, 158, .2))
        drop-shadow(0 0 12px rgba(113, 196, 255, .28));
      user-select: none;
    }

    .placed-gem img {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .gem-placement-mode {
      cursor: crosshair;
    }

    .performance-editing .name-orbit {
      animation-play-state: paused !important;
    }

    .bouquet-stage {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 720px;
      height: 900px;
      transform: translate(-50%, -50%);
      transform-origin: center center;
      filter: drop-shadow(var(--soft-shadow));
    }

    .aurora-disc {
      display: none;
    }

    .stems {
      position: absolute;
      inset: 0;
      z-index: 36;
    }

    .stem-item {
      position: absolute;
      width: var(--w);
      left: var(--x);
      top: var(--y);
      z-index: var(--z);
      cursor: grab;
      user-select: none;
      touch-action: none;
      transform-origin: 50% 88%;
      transform:
        translate(-50%, -50%)
        rotate(var(--r))
        scaleX(var(--flip, 1));
      transition: filter .18s ease;
    }

    .stem-item:active {
      cursor: grabbing;
    }

    .stem-item.selected {
      filter:
        drop-shadow(0 0 8px rgba(80, 164, 255, .52))
        drop-shadow(0 0 22px rgba(255, 255, 255, .9));
    }

    .stem-item img {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .stem-base {
      position: relative;
      z-index: 1;
    }

    .stem-fx {
      position: absolute;
      inset: 0;
      z-index: 3;
      opacity: .72;
      pointer-events: none;
    }

    .edit-box {
      position: absolute;
      inset: -9px;
      z-index: 8;
      border: 1px solid rgba(40, 113, 203, .58);
      border-radius: 7px;
      transform: scaleX(var(--flip, 1));
      transform-origin: center;
      opacity: 0;
      pointer-events: none;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, .72),
        0 0 22px rgba(82, 159, 255, .16);
      transition: opacity .16s ease, transform .16s ease;
    }

    .edit-handle {
      position: absolute;
      width: 14px;
      height: 14px;
      padding: 0;
      appearance: none;
      border: 1px solid rgba(37, 103, 184, .32);
      border-radius: 4px;
      display: grid;
      place-items: center;
      color: rgba(20, 77, 151, .82);
      background:
        linear-gradient(135deg, #ffffff, rgba(214, 239, 255, .96));
      box-shadow:
        0 5px 12px rgba(31, 89, 163, .2),
        0 0 0 3px rgba(255, 255, 255, .58);
      pointer-events: auto;
      user-select: none;
      touch-action: none;
    }

    .edit-handle:hover {
      background: linear-gradient(135deg, #ffffff, rgba(176, 220, 255, .98));
    }

    .corner-handle:hover,
    .delete-handle:hover {
      transform: translateY(-1px);
    }

    .rotate-handle:hover {
      transform: translateX(-50%) translateY(-1px);
    }

    .corner-nw {
      left: -7px;
      top: -7px;
      cursor: nwse-resize;
    }

    .corner-ne {
      right: -7px;
      top: -7px;
      cursor: nesw-resize;
    }

    .corner-se {
      right: -7px;
      bottom: -7px;
      cursor: nwse-resize;
    }

    .corner-sw {
      left: -7px;
      bottom: -7px;
      cursor: nesw-resize;
    }

    .rotate-handle {
      left: 50%;
      top: -39px;
      width: 25px;
      height: 25px;
      border-radius: 50%;
      transform: translateX(-50%);
      cursor: grab;
      font: 800 15px/1 ui-sans-serif, system-ui, sans-serif;
      background:
        radial-gradient(circle at 34% 28%, #ffffff, rgba(225, 242, 255, .95) 42%, rgba(100, 164, 235, .82));
    }

    .rotate-handle::before {
      content: "⟳";
    }

    .delete-handle {
      right: -33px;
      top: -39px;
      width: 25px;
      height: 25px;
      border-radius: 50%;
      cursor: pointer;
      font: 800 17px/1 ui-sans-serif, system-ui, sans-serif;
      color: rgba(24, 77, 142, .88);
      background:
        radial-gradient(circle at 34% 28%, #ffffff, rgba(235, 247, 255, .96) 42%, rgba(132, 190, 245, .82));
    }

    .delete-handle::before {
      content: "×";
    }

    .note-handle {
      right: -63px;
      top: -39px;
      width: 25px;
      height: 25px;
      border-radius: 50%;
      cursor: pointer;
      font: 800 15px/1 ui-serif, Georgia, serif;
      color: rgba(24, 77, 142, .88);
      background:
        radial-gradient(circle at 34% 28%, #ffffff, rgba(235, 247, 255, .96) 42%, rgba(132, 190, 245, .82));
    }

    .note-handle::before {
      content: "✎";
    }

    .edit-box::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -23px;
      width: 1px;
      height: 23px;
      background: rgba(40, 113, 203, .42);
      transform: translateX(-50%);
    }

    .stem-item.selected .edit-box {
      opacity: 1;
      pointer-events: auto;
    }

    .fx-invert {
      clip-path: circle(22% at 73% 24%);
      filter: invert(1) hue-rotate(185deg) saturate(1.65) contrast(1.08);
      mix-blend-mode: screen;
    }

    .fx-pixel {
      clip-path: polygon(52% 2%, 100% 0, 100% 38%, 68% 48%, 50% 30%);
      image-rendering: pixelated;
      transform: scale(1.08);
      filter: saturate(1.5) contrast(1.22) hue-rotate(175deg);
      mix-blend-mode: multiply;
      opacity: .58;
    }

    .fx-line {
      clip-path: polygon(0 8%, 43% 0, 55% 42%, 24% 58%, 0 45%);
      filter: grayscale(1) contrast(8) brightness(1.45);
      mix-blend-mode: multiply;
      opacity: .35;
    }

    .fx-ghost {
      clip-path: ellipse(28% 18% at 62% 18%);
      filter: invert(1) hue-rotate(210deg) saturate(1.8) blur(.4px);
      mix-blend-mode: screen;
      opacity: .54;
      transform: translate(6px, -5px) scale(1.03);
    }

    .stem-item[data-effect="particle"]::after,
    .stem-item[data-effect="pixel"]::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      background:
        radial-gradient(circle, rgba(255, 255, 255, .95) 0 1px, transparent 2px),
        radial-gradient(circle, rgba(76, 169, 255, .75) 0 1px, transparent 2px);
      background-size: 13px 13px, 19px 19px;
      background-position: 2px 5px, 9px 1px;
      clip-path: circle(22% at 74% 25%);
      mix-blend-mode: screen;
      opacity: .62;
      animation: sparkle-drift 5s ease-in-out infinite alternate;
    }

    .wrap-back,
    .wrap,
    .bow,
    .gift-card {
      display: none;
    }

    .trophy-glow {
      position: absolute;
      left: 50%;
      top: 400px;
      width: 420px;
      height: 480px;
      transform: translateX(-50%);
      border-radius: 50%;
      z-index: 16;
      background:
        radial-gradient(ellipse at 50% 40%, rgba(82, 162, 255, .18), transparent 38%),
        radial-gradient(ellipse at 50% 80%, rgba(18, 92, 210, .12), transparent 48%);
      filter: blur(24px);
    }

    .cyber-trophy {
      position: absolute;
      left: 50%;
      top: 382px;
      width: 360px;
      height: 482px;
      transform: translateX(-50%);
      z-index: 74;
      pointer-events: none;
      color: rgba(24, 82, 178, .9);
      filter:
        drop-shadow(0 28px 44px rgba(22, 90, 178, .16))
        drop-shadow(0 0 20px rgba(127, 192, 255, .22));
    }

    .cyber-trophy::before {
      content: "";
      position: absolute;
      inset: -46px -60px -34px;
      opacity: .7;
      background-image:
        radial-gradient(circle, rgba(26, 102, 225, .8) 0 .55px, transparent .8px),
        radial-gradient(circle, rgba(111, 186, 255, .72) 0 .45px, transparent .75px);
      background-size: 13px 11px, 19px 17px;
      background-position: 0 0, 9px 4px;
      clip-path: polygon(16% 16%, 84% 16%, 100% 38%, 82% 67%, 70% 100%, 30% 100%, 18% 67%, 0 38%);
      animation: trophy-particle-flow 9s linear infinite;
      mask-image: radial-gradient(ellipse at 50% 51%, #000 0 34%, rgba(0, 0, 0, .48) 48%, transparent 72%);
    }

    .cyber-trophy svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .trophy-glass-fill {
      fill: url(#glassGradient);
      stroke: rgba(56, 134, 220, .24);
      stroke-width: 1.2;
      filter: url("#glassSoft");
    }

    .trophy-inner-fog {
      fill: url(#innerFog);
      opacity: .38;
    }

    .trophy-highlight {
      fill: none;
      stroke: rgba(255, 255, 255, .72);
      stroke-width: 1.5;
      stroke-linecap: round;
      opacity: .62;
    }

    .trophy-handle-fill {
      fill: none;
      stroke: url("#handleGradient");
      stroke-width: 30;
      stroke-linecap: round;
      opacity: .5;
      filter:
        drop-shadow(0 8px 18px rgba(33, 101, 205, .12))
        drop-shadow(0 0 10px rgba(115, 188, 255, .18));
    }

    .trophy-handle-rim {
      fill: none;
      stroke: rgba(39, 109, 212, .36);
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-dasharray: 4 7;
      opacity: .72;
      filter: drop-shadow(0 0 6px rgba(84, 168, 255, .34));
    }

    .trophy-text-outline {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "PingFang SC", monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .15em;
      fill: rgba(19, 67, 154, .88);
      text-transform: uppercase;
      paint-order: stroke fill;
      stroke: rgba(255, 255, 255, .44);
      stroke-width: .6px;
    }

    .trophy-text-outline.is-soft {
      fill: rgba(72, 139, 230, .58);
      font-size: 11px;
      letter-spacing: .18em;
      stroke-width: .35px;
    }

    .trophy-center-title {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "PingFang SC", monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .13em;
      fill: rgba(19, 67, 154, .88);
      text-anchor: middle;
      text-transform: uppercase;
      paint-order: stroke fill;
      stroke: rgba(255, 255, 255, .44);
      stroke-width: .6px;
    }

    .trophy-construction {
      fill: none;
      stroke: rgba(48, 123, 218, .26);
      stroke-width: 1.2;
      stroke-dasharray: 3 6;
    }

    .name-orbit-layer {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .name-orbit {
      position: absolute;
      width: 250px;
      height: 250px;
      opacity: var(--orbit-opacity, .78);
      overflow: visible;
      contain: layout style paint;
      content-visibility: auto;
      contain-intrinsic-size: 250px 250px;
      will-change: transform, opacity;
      backface-visibility: hidden;
      filter: drop-shadow(0 0 9px rgba(61, 159, 255, .16));
      animation: orbit-breathe 8s ease-in-out infinite alternate;
    }

    .name-orbit svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .name-orbit text {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "PingFang SC", monospace;
      font-size: 8.8px;
      font-weight: 800;
      letter-spacing: .035em;
      fill: rgba(31, 112, 222, .76);
      paint-order: stroke fill;
      stroke: rgba(255, 255, 255, .32);
      stroke-width: .22px;
    }

    .name-orbit .orbit-guide {
      fill: none;
      stroke: rgba(36, 121, 228, .14);
      stroke-width: .8;
      stroke-dasharray: 2 7;
    }

    @keyframes orbit-breathe {
      from {
        opacity: .54;
        transform: translate3d(0, 0, 0) scale(.985);
      }
      to {
        opacity: .82;
        transform: translate3d(0, -8px, 0) scale(1.018);
      }
    }

    @keyframes trophy-particle-flow {
      from {
        background-position: 0 0, 9px 4px;
      }
      to {
        background-position: 72px -42px, -47px 58px;
      }
    }

    .trophy-plaque {
      display: none;
      position: fixed;
      right: 28px;
      bottom: 94px;
      width: min(292px, calc(100vw - 56px));
      min-height: 142px;
      padding: 24px 22px 22px;
      z-index: 184;
      appearance: none;
      color: rgba(19, 68, 154, .92);
      text-align: center;
      border: 1px solid rgba(64, 137, 224, .22);
      border-radius: 22px;
      background:
        radial-gradient(circle at 20% 12%, rgba(255, 255, 255, .86), transparent 31%),
        radial-gradient(ellipse at 70% 92%, rgba(16, 88, 205, .18), transparent 45%),
        linear-gradient(135deg, rgba(255, 255, 255, .62), rgba(218, 240, 255, .5) 34%, rgba(105, 174, 255, .24) 70%, rgba(255, 255, 255, .58));
      box-shadow:
        0 28px 64px rgba(21, 80, 165, .16),
        inset 0 1px 0 rgba(255, 255, 255, .92),
        inset 0 -22px 46px rgba(37, 114, 216, .1);
      backdrop-filter: blur(20px) saturate(1.22);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "PingFang SC", monospace;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.72;
      letter-spacing: .08em;
      text-shadow: 0 1px 0 rgba(255, 255, 255, .58);
      cursor: zoom-in;
      pointer-events: auto;
    }

    .trophy-plaque::before {
      content: none;
    }

    .trophy-plaque span {
      display: block;
    }

    .trophy-plaque span:first-child {
      margin-bottom: 14px;
      font-size: 16px;
      letter-spacing: .16em;
    }

    .callout-layer {
      position: absolute;
      inset: 0;
      z-index: 150;
      pointer-events: none;
    }

    .callout-arrow {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
      pointer-events: none;
    }

    .callout-arrow path {
      fill: none;
      stroke: rgba(43, 112, 205, .7);
      stroke-width: 2.1;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: none;
      filter: drop-shadow(0 2px 4px rgba(55, 130, 220, .16));
    }

    .callout-arrow path.callout-sketch {
      stroke: rgba(128, 186, 244, .36);
      stroke-width: 1.1;
      filter: none;
    }

    .callout-arrow path.arrow-tip {
      stroke-dasharray: none;
      stroke-width: 2;
    }

    .flower-callout {
      position: absolute;
      width: 124px;
      min-height: 34px;
      pointer-events: auto;
      transform: rotate(var(--note-r, -4deg));
      transform-origin: center;
      z-index: 3;
    }

    .flower-note-chip {
      width: 100%;
      min-height: 34px;

    .paperclip {
      position: absolute;
      right: 34px;
      top: -35px;
      width: 46px;
      height: 88px;
      z-index: 3;
      transform: rotate(6deg);
      filter: drop-shadow(2px 4px 2px rgba(40, 57, 83, .12));

    .paperclip::before,
    .paperclip::after {
      content: "";
      position: absolute;
      border: 3px solid rgba(45, 59, 78, .58);
      border-bottom-color: transparent;
      background: transparent;
    }

    .paperclip::before {
      left: 9px;
      top: 0;
      width: 27px;
      height: 73px;
      border-radius: 17px 17px 11px 11px;
    }

    .paperclip::after {
      left: 17px;
      top: 11px;
      width: 13px;
      height: 49px;
      border-radius: 11px 11px 7px 7px;
    }

      left: 20px;
      top: 58px;
      width: 17px;
      height: 3px;
      border-radius: 999px;
      background: rgba(45, 59, 78, .58);
      transform: rotate(25deg);
      transform-origin: left center;
    }

    .toolbar {
      position: fixed;
      right: 22px;
      bottom: 22px;
      display: flex;
      gap: 10px;
      z-index: 200;
    }

    .tool-btn {

      height: 42px;

      place-items: center;
      cursor: pointer;

      transform: translateY(-2px);
      background: rgba(239, 248, 255, .94);
    }

      background: rgba(255, 255, 255, .78);
      box-shadow: 0 12px 26px rgba(24, 75, 150, .15);

      cursor: pointer;
      transition: transform .16s ease, background .16s ease, color .16s ease;
    }

    .save-btn:hover {
      transform: translateY(-2px);
      background: rgba(239, 248, 255, .96);
    }

    .save-btn.saved {
      color: #0b8062;
      background: rgba(235, 255, 249, .92);
    }

    .gift-mode .palette,
    .gift-mode .toolbar,
    .gift-mode .save-btn,
    .gift-mode .edit-box {
      display: none !important;
    }

    .gift-mode .stem-item {
      cursor: default;
    }

    @keyframes slow-turn {
      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    @keyframes sparkle-drift {
      from {
        background-position: 2px 5px, 9px 1px;
      }
      to {
        background-position: 9px 1px, 2px 8px;
      }
    }

    @media (max-width: 700px) {
      .palette {
        left: 12px;
        top: 14px;
        width: min(330px, calc(100vw - 24px));
        max-height: 180px;
        transform: none;
      }

      .palette-list {
        grid-auto-flow: column;
        grid-auto-columns: 150px;
        overflow-x: auto;
        overflow-y: hidden;
        max-height: none;
      }

      .palette-tabs {
        margin-bottom: 8px;
      }

      .gem-palette-item {
        grid-template-columns: 42px minmax(0, 1fr);
      }

      .gem-palette-item .palette-count {
        display: none;
      }

      .toolbar {
        right: 14px;
        bottom: 14px;
      }

      .save-btn {
        right: 14px;
        top: 14px;
      }

      .flower-note-dialog {
        width: calc(100vw - 28px);
        min-height: calc(100vh - 28px);
      }

      .flower-envelope {
        width: calc(100vw - 48px);
        height: min(470px, calc(100vh - 92px));

      }

      .flower-envelope::before {
        clip-path: polygon(0 9.8%, 43.5% 9.8%, 52.8% 17.2%, 100% 17.2%, 100% 100%, 0 100%);

      .note-flower-preview {

      }

        left: 74px;
        bottom: 166px;
        width: 142px;

      }

        bottom: 28px;
      }

      }

      .note-card {
        right: 8px;

        padding: 24px 24px 22px;
      }

      .note-card-orbit {
        right: -2px;
        top: 126px;
        width: calc(100vw - 64px);
        height: 270px;
      }

      .note-card h2 {
        font-size: 25px;
      }

      .note-card p {
        font-size: 20px;
        line-height: 1.52;
      }
    }
  </style>
</head>

    function getAlphaMask(img) {
      const key = img.currentSrc || img.src;
      if (alphaMaskCache.has(key)) return alphaMaskCache.get(key);
      if (!img.complete || !img.naturalWidth || !img.naturalHeight) return null;
      try {
        const canvas = document.createElement("canvas");
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const maskCtx = canvas.getContext("2d", { willReadFrequently: true });
        maskCtx.drawImage(img, 0, 0);
        const mask = {
          width: canvas.width,
          height: canvas.height,
          data: maskCtx.getImageData(0, 0, canvas.width, canvas.height).data
        };
        alphaMaskCache.set(key, mask);
        return mask;
      } catch (error) {
        const fallback = { opaque: true };
        alphaMaskCache.set(key, fallback);
        return fallback;
      }
    }

    function getAlphaMaskForAsset(item) {
      const img = new Image();
      img.src = assetSrc(ASSET_BASE, item.src);
      return new Promise((resolve) => {
        if (img.complete) {
          resolve(getAlphaMask(img));
          return;
        }
        img.onload = () => resolve(getAlphaMask(img));
        img.onerror = () => resolve(null);
      });
    }

    function getImageHitUv(event, img) {
      if (typeof img.getBoxQuads === "function") {
        const quad = img.getBoxQuads({ box: "content" })[0];
        if (quad) {
          const relX = event.clientX - quad.p1.x;
          const relY = event.clientY - quad.p1.y;
          const axisX = {
            x: quad.p2.x - quad.p1.x,
            y: quad.p2.y - quad.p1.y
          };
          const axisY = {
            x: quad.p4.x - quad.p1.x,
            y: quad.p4.y - quad.p1.y
          };
          const determinant = axisX.x * axisY.y - axisX.y * axisY.x;
          if (Math.abs(determinant) > .001) {
            return {
              u: (relX * axisY.y - relY * axisY.x) / determinant,
              v: (axisX.x * relY - axisX.y * relX) / determinant
            };
          }
        }
      }

      const stemEl = img.closest(".stem-item");
      if (stemEl && window.DOMMatrix && window.DOMPoint) {
        try {
          const stageRect = stage.getBoundingClientRect();
          const stageX = (event.clientX - stageRect.left) / stageScale;
          const stageY = (event.clientY - stageRect.top) / stageScale;
          const style = getComputedStyle(stemEl);
          const matrix = new DOMMatrix(style.transform === "none" ? undefined : style.transform);
          const inverse = matrix.inverse();
          const origin = style.transformOrigin.split(/\s+/).map((value) => parseFloat(value) || 0);
          const originX = origin[0] || 0;
          const originY = origin[1] || 0;
          const localPoint = inverse.transformPoint(new DOMPoint(
            stageX - stemEl.offsetLeft - originX,
            stageY - stemEl.offsetTop - originY
          ));
          return {
            u: (localPoint.x + originX) / img.offsetWidth,
            v: (localPoint.y + originY) / img.offsetHeight
          };
        } catch (error) {
          // Fall back to the transformed bounding box below.
        }
      }

      const rect = img.getBoundingClientRect();
      return {
        u: (event.clientX - rect.left) / rect.width,
        v: (event.clientY - rect.top) / rect.height
      };
    }

    function isOpaqueImageHit(event, img) {
      const { u, v } = getImageHitUv(event, img);
      if (u < 0 || u > 1 || v < 0 || v > 1) return false;

      const mask = getAlphaMask(img);
      if (!mask || mask.opaque) return true;
      const x = Math.round(u * (mask.width - 1));
      const y = Math.round(v * (mask.height - 1));
      const radius = Math.max(1, Math.round(Math.min(mask.width, mask.height) * .0025));
      for (let yy = Math.max(0, y - radius); yy <= Math.min(mask.height - 1, y + radius); yy += 1) {
        for (let xx = Math.max(0, x - radius); xx <= Math.min(mask.width - 1, x + radius); xx += 1) {
          if (mask.data[(yy * mask.width + xx) * 4 + 3] > 24) return true;
        }
      }
      return false;
    }

      return el;
    }

    function startStemMove(data, event) {
      event.preventDefault();

    function assetSrc(base, src) {
      if (!src) return "";
      if (/^(data:|https?:|file:|blob:)/.test(src)) return src;
      return base + src;
    }

    function catalogEnglishName(item) {
      return item.id
        .split("-")
        .filter((part) => !/^\d+$/.test(part))
        .map((part) => part === "annes" ? "anne's" : part)

    function isMaskFilled(mask, x, y) {
      if (x < 0 || y < 0 || x >= mask.width || y >= mask.height) return false;
      return mask.data[(y * mask.width + x) * 4 + 3] > 24;
    }

    function getAlphaBounds(mask, step = 3) {
      let left = mask.width;
      let top = mask.height;
      let right = -1;
      let bottom = -1;
      for (let y = 0; y < mask.height; y += step) {

      const bottom = Math.max(...points.map((p) => p.y));

      const sourceH = Math.max(1, bottom - top);

      const offsetY = (250 - sourceH * scale) / 2;

        y: offsetY + (p.y - top) * scale
      }));

    const orbitCropByCatalog = {

      "lily-grass": [.22, .02, .86, .45],
      delphinium: [.28, .07, .72, .48],

      iris: [.16, .08, .78, .43],

    function getOrbitCrop(mask, item) {
      const crop = orbitCropByCatalog[item.id];
      if (!crop) {

          left: bounds.left,
          top: bounds.top,
          right: bounds.right,
          bottom: Math.floor(bounds.top + bounds.height * .55)

        top: Math.floor(mask.height * crop[1]),
        right: Math.floor(mask.width * crop[2]),
        bottom: Math.floor(mask.height * crop[3])

    function fillMissingRadii(radii) {

        let next = i;

          const b = (i + step) % length;

            !isMaskFilled(mask, x + step, y) ||
            !isMaskFilled(mask, x, y - step) ||
            !isMaskFilled(mask, x, y + step) ||
            !isMaskFilled(mask, x - step, y - step) ||
            !isMaskFilled(mask, x + step, y + step);

    const orbitPalettes = [

      ["#7ffff0", "#128bd0", "#082d82"],

      ["#e7f7ff", "#68b6ff", "#125ed1"],
      ["#9ec9ff", "#2356d6", "#06195e"],
      ["#d1fbff", "#24c1d4", "#1954a8"],
      ["#b6d4ff", "#7a8dff", "#2636a7"],
      ["#7cd1ff", "#0d6cbb", "#001f74"]

      "seeded-eucalyptus": { size: [270, 390], lines: [1, 3], palettes: [5, 3, 1], repeats: [22, 34] },
      "lily-grass": { size: [330, 460], lines: [1, 2], palettes: [0, 1, 6], repeats: [24, 38] },
      delphinium: { size: [300, 420], lines: [2, 3], palettes: [4, 7, 2], repeats: [24, 38] },
      hydrangea: { size: [230, 330], lines: [2, 3], palettes: [0, 3, 6], repeats: [18, 28] },
      iris: { size: [300, 410], lines: [2, 3], palettes: [2, 6, 4], repeats: [22, 36] },
      orchid: { size: [310, 430], lines: [1, 3], palettes: [3, 0, 5], repeats: [24, 38] },
      anemone: { size: [220, 320], lines: [2, 3], palettes: [4, 7, 0], repeats: [18, 28] },

    function viewportSize() {

        top: cy - size / 2,
        right: cx + size / 2,
        bottom: cy + size / 2,
        width: size,
        height: size
      };

        viewport.height * (Number(orbit.y) || 0) / 100,

    function expandRect(rect, padding) {

        top: rect.top - padding,
        right: rect.right + padding,
        bottom: rect.bottom + padding,
        width: rect.width + padding * 2,
        height: rect.height + padding * 2

    }

          top: viewport.height * .2,

      const centerY = (avoid.top + avoid.bottom) / 2;
      const topY = avoid.top - gap - size / 2;
      const bottomY = avoid.bottom + gap + size / 2;
      const leftX = avoid.left - gap - size / 2;
      const rightX = avoid.right + gap + size / 2;

        { cx: centerX, cy: topY },
        { cx: avoid.right + size * .08, cy: topY },
        { cx: rightX, cy: avoid.top + size * .18 },
        { cx: rightX, cy: centerY },
        { cx: rightX, cy: avoid.bottom - size * .18 },
        { cx: avoid.right + size * .08, cy: bottomY },
        { cx: centerX, cy: bottomY },
        { cx: avoid.left - size * .08, cy: bottomY },
        { cx: leftX, cy: avoid.bottom - size * .18 },
        { cx: leftX, cy: centerY },
        { cx: leftX, cy: avoid.top + size * .18 },
        { cx: viewport.width - size * .18, cy: size * .18 },
        { cx: viewport.width - size * .16, cy: viewport.height - size * .2 },
        { cx: size * .2, cy: viewport.height - size * .18 },

    function pickOrbitPlacement(seed, desiredSize) {
      const viewport = viewportSize();
      const avoid = expandRect(centralOrbitAvoidRect(), 12);
      const used = nameOrbits.map(orbitRectFromData);
      const viewportLimit = Math.min(viewport.width, viewport.height) * .52;
      const startSize = Math.round(Math.min(desiredSize, viewportLimit));
      const scales = [1, .94, .88, .82, .76, .7, .64, .58];
      let best = null;

      for (const scale of scales) {
        const size = Math.max(150, Math.round(startSize * scale));

        for (const candidate of candidates) {
          const rect = orbitRectFromCenter(candidate.cx, candidate.cy, size);
          const visible = visibleOrbitRatio(rect);

          const overlapsExisting = used.some((other) => rectsIntersect(rect, other, 22));
          if (overlapsExisting) continue;

            x: clamp(candidate.cx / viewport.width * 100, -10, 110),
            y: clamp(candidate.cy / viewport.height * 100, -10, 110),

          cx: viewport.width * (.12 + (orbitHash(seed) % 76) / 100),
          cy: viewport.height * ((orbitHash(`${seed}-y`) % 2) ? .08 : .92)

        size: Math.max(150, Math.round(startSize * .58))

        x: clamp(fallback.candidate.cx / viewport.width * 100, -10, 110),
        y: clamp(fallback.candidate.cy / viewport.height * 100, -10, 110),
        size: fallback.size

        seenCatalogs.add(orbit.catalog);

      newestFirst.forEach((orbit) => {

        updateAllNameOrbitAnimationStates();
        return;
      }
      performanceResumeTimer = window.setTimeout(() => {
        isPerformanceEditing = false;
        document.body.classList.remove("performance-editing");
        updateAllNameOrbitAnimationStates();
      }, 180);
    }

    function renderNameOrbits() {
      if (orbitVisibilityObserver) {
        orbitVisibilityObserver.disconnect();
      }
      nameOrbitLayer.innerHTML = "";
      const fragment = document.createDocumentFragment();
      nameOrbits.forEach((orbit) => {
        const wrapper = document.createElement("div");
        wrapper.className = "name-orbit";
        wrapper.style.left = `calc(${orbit.x}% - ${orbit.size / 2}px)`;
        wrapper.style.top = `calc(${orbit.y}% - ${orbit.size / 2}px)`;
        wrapper.style.width = `${orbit.size}px`;
        wrapper.style.height = `${orbit.size}px`;
        wrapper.style.animationDuration = `${orbit.duration}s`;
        wrapper.style.setProperty("--orbit-opacity", orbit.opacity || .74);
        wrapper.innerHTML = getNameOrbitMarkup(orbit);
        fragment.appendChild(wrapper);
      });
      nameOrbitLayer.appendChild(fragment);
      nameOrbitLayer.querySelectorAll(".name-orbit").forEach(observeNameOrbit);
    }

    function updateStemElement(data, el = getStemElement(data.uid)) {
      if (!el) return;
      el.style.setProperty("--x", `${data.x}px`);
      el.style.setProperty("--y", `${data.y}px`);
      el.style.setProperty("--w", `${data.w}px`);
      el.style.setProperty("--r", `${data.r || 0}deg`);
      el.style.setProperty("--z", data.z);
      el.style.setProperty("--flip", data.flip || 1);
      el.dataset.flip = String(data.flip || 1);
    }

    function setActive(id, raise = false) {
      activeId = id;
      if (id && raise) {
        const stem = getStemData(id);
        if (stem) {
          stem.z = getTopZ() + 1;
          updateStemElement(stem);
        }
      }
      document.querySelectorAll(".stem-item").forEach((el) => {
        el.classList.toggle("selected", el.dataset.id === id);
      });
    }

    function getStemElement(id) {
      if (!id) return null;
      return document.querySelector(`.stem-item[data-id="${CSS.escape(id)}"]`);
    }

    function getStemData(id = activeId) {
      if (!id) return null;
      return stems.find((stem) => stem.uid === id);
    }

    function getTopZ() {
      return stems.reduce((top, stem) => Math.max(top, stem.z || 0), 0);
    }

    function sendStemToBack(data = getStemData()) {
      if (!data || isGiftMode) return;
      const ordered = stems
        .slice()
        .sort((a, b) => {
          if (a.uid === data.uid) return -1;
          if (b.uid === data.uid) return 1;
          return (Number(a.z) || 0) - (Number(b.z) || 0);
        });
      ordered.forEach((stem, index) => {
        stem.z = index + 1;
        updateStemElement(stem);
      });
      setActive(data.uid);
    }

    function flipStem(data = getStemData()) {
      if (!data) return;
      data.flip = (data.flip || 1) * -1;
      updateStemElement(data);
      renderCallouts();
    }

    function resizeStem(data, delta) {
      if (!data) return;
      data.w = clamp(data.w + delta, 92, 520);
      updateStemElement(data);
      renderCallouts();
    }

    function resetActiveStem() {
      const data = getStemData();
      if (!data) return;
      data.x = data.home.x;
      data.y = data.home.y;
      data.w = data.home.w;
      data.r = data.home.r;
      data.flip = data.home.flip;
      updateStemElement(data);
      renderCallouts();
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function normalizeAngle(angle) {
      return ((angle + 180) % 360 + 360) % 360 - 180;
    }

    function getElementCenter(el) {
      const rect = el.getBoundingClientRect();
      return {
        x: rect.left + rect.width / 2,
        y: rect.top + rect.height / 2
      };
    }

    function getDistance(event, center) {
      return Math.hypot(event.clientX - center.x, event.clientY - center.y) || 1;
    }

    function getPointerAngle(event, center) {
      return Math.atan2(event.clientY - center.y, event.clientX - center.x) * 180 / Math.PI;
    }

    function addStem(catalogId) {
      if (isGiftMode) return;
      const source = [...stems].reverse().find((stem) => stem.catalog === catalogId);
      const template = source || defaultStemByCatalog.get(catalogId);
      if (!template) return;
      const count = stems.filter((stem) => stem.catalog === catalogId).length;
      const offsetX = ((count % 3) - 1) * 28;
      const offsetY = ((count % 4) - 1.5) * 18;
      const duplicate = makeStem({
        catalog: catalogId,
        x: clamp(template.x + offsetX, 64, 660),
        y: clamp(template.y + offsetY, 150, 735),
        w: template.w,
        r: (template.r || 0) + ((count % 5) - 2) * 3,
        z: getTopZ() + 1,
        flip: count % 2 === 0 ? (template.flip || 1) * -1 : (template.flip || 1)
      });
      stems.push(duplicate);
      stemsRoot.appendChild(createStem(duplicate));
      setActive(duplicate.uid, true);
      renderPalette();
    }

    function deleteStem(id = activeId) {
      if (isGiftMode || !id) return;
      const index = stems.findIndex((stem) => stem.uid === id);
      if (index < 0) return;
      stems.splice(index, 1);
      activeId = stems.length ? stems[Math.min(index, stems.length - 1)].uid : null;
      renderStems();
      renderPalette();
    }

    function getTopGemZ() {
      return placedGems.reduce((top, gem) => Math.max(top, Number(gem.z) || 0), 0);
    }

    function setActiveGem(gemId) {

    function toggleGemPlacement(gemId) {

    function placeGemAt(event) {
      const item = gemCatalogById.get(activeGemId);
      if (!item) return;
      const viewport = viewportSize();
      const seed = orbitHash(`${item.id}-${nextGemId}`);
      const gem = makeGem({
        gem: item.id,
        x: clamp(event.clientX / viewport.width * 100, 0, 100),
        y: clamp(event.clientY / viewport.height * 100, 0, 100),
        w: item.size * (.92 + (seed % 9) * .02),
        r: ((seed % 29) - 14) * .9,
        scale: .94 + ((seed >> 4) % 12) * .012,
        z: getTopGemZ() + 1,
        opacity: .9 + ((seed >> 8) % 8) * .01
      });
      if (!gem) return;
      placedGems.push(gem);
      renderPlacedGems();
      renderGemPalette();
    }

    function renderPlacedGems() {
      if (!gemLayer) return;
      gemLayer.innerHTML = "";
      placedGems.forEach((gem) => {
        const item = gemCatalogById.get(gem.gem);
        if (!item) return;
        const wrapper = document.createElement("span");
        wrapper.className = "placed-gem";
        wrapper.style.setProperty("--gem-x", `${gem.x}%`);
        wrapper.style.setProperty("--gem-y", `${gem.y}%`);
        wrapper.style.setProperty("--gem-w", `${gem.w}px`);
        wrapper.style.setProperty("--gem-r", `${gem.r || 0}deg`);
        wrapper.style.setProperty("--gem-scale", gem.scale || 1);
        wrapper.style.setProperty("--gem-z", gem.z || 1);
        wrapper.style.setProperty("--gem-opacity", gem.opacity || .96);

        const img = document.createElement("img");
        img.src = assetSrc(GEM_ASSET_BASE, item.src);
        img.alt = "";
        img.draggable = false;
        wrapper.appendChild(img);
        gemLayer.appendChild(wrapper);
      });
    }

    function isGemPlacementBlockedTarget(target) {
      if (!(target instanceof Element)) return false;

        target.closest(".palette") ||
        target.closest(".callout-layer") ||
        target.closest(".toolbar") ||
        target.closest(".save-btn") ||
        target.closest(".trophy-plaque") ||

      event.stopPropagation();

    function estimateStemRect(stem, pad = 0) {
      const ratio = 1.49;
      const height = stem.w * ratio;
      return {
        x: stem.x - stem.w / 2 - pad,
        y: stem.y - height / 2 - pad,
        w: stem.w + pad * 2,
        h: height + pad * 2
      };
    }

    function getStemImageMetrics(stem) {
      const el = getStemElement(stem.uid);
      const img = el ? el.querySelector(".stem-base") : null;
      const width = img && img.clientWidth ? img.clientWidth : stem.w;
      const height = img && img.clientHeight ? img.clientHeight : width * 1.49;
      return { width, height };
    }

    function getFlowerHeadLocalRect(stem, pad = 0) {
      const { width } = getStemImageMetrics(stem);
      const isGreenery = String(stem.catalog).includes("grass") || String(stem.catalog).includes("eucalyptus");
      const headWidth = width * (isGreenery ? .34 : .68);
      const headHeight = width * (isGreenery ? .58 : .52);
      return {
        x: width / 2 - headWidth / 2 - pad,
        y: width * (isGreenery ? .08 : .1) - pad,
        w: headWidth + pad * 2,
        h: headHeight + pad * 2
      };
    }

        try {
          const style = getComputedStyle(el);
          const matrix = new DOMMatrix(style.transform === "none" ? undefined : style.transform);
          const origin = style.transformOrigin.split(/\s+/).map((value) => parseFloat(value) || 0);
          const originX = origin[0] || 0;
          const originY = origin[1] || 0;
          const point = matrix.transformPoint(new DOMPoint(localX - originX, localY - originY));
          return {
            x: el.offsetLeft + originX + point.x,
            y: el.offsetTop + originY + point.y
          };
        } catch (error) {
          // Fall through to the geometric approximation below.
        }
      }

      const { width, height } = getStemImageMetrics(stem);
      const originX = width / 2;
      const originY = height * .88;
      const angle = (Number(stem.r) || 0) * Math.PI / 180;
      const dx = (localX - originX) * (Number(stem.flip) || 1);
      const dy = localY - originY;
      return {
        x: stem.x + originX - width / 2 + dx * Math.cos(angle) - dy * Math.sin(angle),
        y: stem.y + originY - height / 2 + dx * Math.sin(angle) + dy * Math.cos(angle)
      };
    }

    function estimateFlowerHeadRect(stem, pad = 0) {
      const head = getFlowerHeadLocalRect(stem, pad);
      const points = [
        transformStemLocalPoint(stem, head.x, head.y),
        transformStemLocalPoint(stem, head.x + head.w, head.y),
        transformStemLocalPoint(stem, head.x + head.w, head.y + head.h),
        transformStemLocalPoint(stem, head.x, head.y + head.h)
      ];
      const xs = points.map((point) => point.x);
      const ys = points.map((point) => point.y);
      const left = Math.min(...xs);
      const top = Math.min(...ys);
      const right = Math.max(...xs);
      const bottom = Math.max(...ys);
      return {
        x: left,
        y: top,
        w: right - left,
        h: bottom - top
      };
    }

    function getStemCalloutAnchor(stem) {
      const head = getFlowerHeadLocalRect(stem, 0);
      return {
        ...transformStemLocalPoint(stem, head.x + head.w / 2, head.y + head.h / 2),
        radius: clamp(Math.max(head.w * .3, head.h * .25), 22, 58)
      };
    }

    function rectsOverlap(a, b, pad = 0) {
      return !(
        a.x + a.w + pad < b.x ||
        b.x + b.w + pad < a.x ||
        a.y + a.h + pad < b.y ||
        b.y + b.h + pad < a.y
      );
    }

    function getNoteRect(note) {
      return { x: note.x, y: note.y, w: note.w || 124, h: note.h || 38 };
    }

    function pickNotePlacement(stem) {
      const tagW = 124;
      const tagH = 38;
      const seed = orbitHash(`${stem.uid}-${stem.catalog}`);
      const occupied = [
        { x: 232, y: 382, w: 256, h: 300 },
        ...stems.map((item) => estimateFlowerHeadRect(item, 12)),
        ...stems
          .filter((item) => item.note && item.uid !== stem.uid)
          .map((item) => getNoteRect(item.note))
      ];
      const ordered = noteCandidates.map((candidate, i) => noteCandidates[(i + seed) % noteCandidates.length]);
      for (const candidate of ordered) {
        const rect = {
          x: clamp(stem.x + candidate.dx, 18, 720 - tagW - 18),
          y: clamp(stem.y + candidate.dy, 20, 900 - tagH - 20),
          w: tagW,
          h: tagH
        };
        if (!occupied.some((other) => rectsOverlap(rect, other, 12))) {
          return { ...rect, r: candidate.r };
        }
      }
      const fallback = ordered[seed % ordered.length];
      return {
        x: clamp(stem.x + fallback.dx, 18, 720 - tagW - 18),
        y: clamp(stem.y + fallback.dy, 20, 900 - tagH - 20),
        w: tagW,
        h: tagH,
        r: fallback.r
      };
    }

    function createFlowerNote(stem) {
      const configured = configuredCards[stem.catalog] || null;
      const placement = configured && Number.isFinite(Number(configured.x)) && Number.isFinite(Number(configured.y))
        ? {
            x: Number(configured.x),
            y: Number(configured.y),
            w: Number(configured.w) || 124,
            h: Number(configured.h) || 38,
            r: Number(configured.r) || 0
          }
        : pickNotePlacement(stem);
      const item = catalogById.get(stem.catalog) || stem;
      return {
        id: `note-${stem.uid}`,
        label: configured && configured.label ? configured.label : item.name,
        title: configured && configured.title ? configured.title : `给妈妈的${item.name}`,
        text: configured && configured.text ? configured.text : flowerStories[item.id] || `妈妈，这支${item.name}让我想起很多平凡的小事：你把热汤放到我手边，也把安心放进我每天的生活里。母亲节快乐。`,
        ...placement
      };
    }

    function addOrOpenFlowerNote(uid) {
      const stem = getStemData(uid);
      if (!stem) return;
      if (!stem.note) {
        stem.note = createFlowerNote(stem);
        renderCallouts();
      }
      openFlowerNoteModal(uid);
    }

    function arrowPathFor(stem, note) {
      const tagW = note.w || 124;
      const tagH = note.h || 38;
      const tagCenter = { x: note.x + tagW / 2, y: note.y + tagH / 2 };
      const headCenter = getStemCalloutAnchor(stem);
      const dx = tagCenter.x - headCenter.x;
      const dy = tagCenter.y - headCenter.y;
      const distance = Math.hypot(dx, dy) || 1;
      const unit = { x: dx / distance, y: dy / distance };
      const flowerRadius = headCenter.radius || 34;
      const start = {
        x: headCenter.x + unit.x * (flowerRadius + 13),
        y: headCenter.y + unit.y * (flowerRadius + 10)
      };
      const sideGap = 13;
      let end;
      if (Math.abs(dx) > Math.abs(dy) * .72) {
        end = {
          x: dx > 0 ? note.x - sideGap : note.x + tagW + sideGap,
          y: clamp(headCenter.y + dy * .18, note.y + 10, note.y + tagH - 10)
        };
      } else {
        end = {
          x: clamp(headCenter.x + dx * .16, note.x + 14, note.x + tagW - 14),
          y: dy > 0 ? note.y - sideGap : note.y + tagH + sideGap
        };
      }
      const vx = end.x - start.x;
      const vy = end.y - start.y;
      const curveLength = Math.hypot(vx, vy) || 1;
      const dir = { x: vx / curveLength, y: vy / curveLength };
      const perp = { x: -dir.y, y: dir.x };
      const centerPull = { x: 360 - (start.x + end.x) / 2, y: 430 - (start.y + end.y) / 2 };
      const pullDot = perp.x * centerPull.x + perp.y * centerPull.y;
      const seed = orbitHash(`${stem.uid}-${note.id || note.label}`);
      const bendSign = pullDot > 0 ? -1 : 1;
      const bendJitter = ((seed % 13) - 6) * .9;
      const bend = bendSign * clamp(curveLength * .2, 34, 92) + bendJitter;
      const c1 = {
        x: start.x + dir.x * curveLength * .32 + perp.x * bend,
        y: start.y + dir.y * curveLength * .32 + perp.y * bend
      };
      const c2 = {
        x: start.x + dir.x * curveLength * .78 + perp.x * bend * .72,
        y: start.y + dir.y * curveLength * .78 + perp.y * bend * .72
      };
      const sketchShift = ((seed % 9) - 4) * .65;
      const sketchStart = {
        x: start.x + perp.x * sketchShift,
        y: start.y + perp.y * sketchShift
      };
      const sketchEnd = {
        x: end.x + perp.x * sketchShift * .6,
        y: end.y + perp.y * sketchShift * .6
      };
      const sketchC1 = {
        x: c1.x + perp.x * (sketchShift + 2.2) + dir.x * .9,
        y: c1.y + perp.y * (sketchShift + 2.2) + dir.y * .9
      };
      const sketchC2 = {
        x: c2.x + perp.x * (sketchShift - 1.6) - dir.x * .7,
        y: c2.y + perp.y * (sketchShift - 1.6) - dir.y * .7
      };
      const path = `M${start.x.toFixed(1)} ${start.y.toFixed(1)} C${c1.x.toFixed(1)} ${c1.y.toFixed(1)} ${c2.x.toFixed(1)} ${c2.y.toFixed(1)} ${end.x.toFixed(1)} ${end.y.toFixed(1)}`;
      const sketch = `M${sketchStart.x.toFixed(1)} ${sketchStart.y.toFixed(1)} C${sketchC1.x.toFixed(1)} ${sketchC1.y.toFixed(1)} ${sketchC2.x.toFixed(1)} ${sketchC2.y.toFixed(1)} ${sketchEnd.x.toFixed(1)} ${sketchEnd.y.toFixed(1)}`;
      const finalAngle = Math.atan2(end.y - c2.y, end.x - c2.x);
      const size = 10.5;
      const left = {
        x: end.x - Math.cos(finalAngle - .62) * size,
        y: end.y - Math.sin(finalAngle - .62) * size
      };
      const right = {
        x: end.x - Math.cos(finalAngle + .62) * size,
        y: end.y - Math.sin(finalAngle + .62) * size
      };
      return {
        curve: path,
        sketch,
        tip: `M${left.x.toFixed(1)} ${left.y.toFixed(1)} L${end.x.toFixed(1)} ${end.y.toFixed(1)} L${right.x.toFixed(1)} ${right.y.toFixed(1)}`
      };
    }

    function renderCallouts() {
      if (!calloutLayer) return;
      const callouts = stems.filter((stem) => stem.note);
      calloutLayer.innerHTML = callouts.map((stem) => {
        const note = stem.note;
        const arrow = arrowPathFor(stem, note);
        return `
          <svg class="callout-arrow" viewBox="0 0 720 900" aria-hidden="true">
            <path class="callout-sketch" d="${arrow.sketch}" />
            <path d="${arrow.curve}" />
            <path class="arrow-tip" d="${arrow.tip}" />
          </svg>
          <div class="flower-callout" style="left:${note.x}px; top:${note.y}px; --note-r:${note.r || 0}deg">
            <button class="flower-note-chip" type="button" data-note-stem="${stem.uid}" aria-label="查看${note.label}小卡片">${escapeText(note.label)}</button>
          </div>`;
      }).join("");
      calloutLayer.querySelectorAll("[data-note-stem]").forEach((button) => {
        button.addEventListener("pointerdown", (event) => {
          event.stopPropagation();
          if (!isGiftMode) {
            startNoteDrag(button.dataset.noteStem, event);
          }
        });
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          if (suppressedNoteClickUid === button.dataset.noteStem) {
            suppressedNoteClickUid = null;
            return;
          }
          openFlowerNoteModal(button.dataset.noteStem);
        });
      });
    }

    function serializeStem(stem) {
      return {
        uid: stem.uid,
        catalog: stem.catalog,
        x: stem.x,
        y: stem.y,
        w: stem.w,
        r: stem.r || 0,
        z: stem.z,
        flip: stem.flip || 1,
        note: stem.note ? { ...stem.note } : null
      };
    }

    function serializeGem(gem) {
      return {
        uid: gem.uid,
        gem: gem.gem,
        x: gem.x,
        y: gem.y,
        w: gem.w,
        r: gem.r || 0,
        scale: gem.scale || 1,
        z: gem.z,
        opacity: gem.opacity
      };
    }

    function getLayoutSnapshot() {
      return {
        version: ORBIT_VERSION,
        nextStemId,
        nextOrbitId,
        nextGemId,
        activeId,
        stems: stems.map(serializeStem),
        nameOrbits,
        placedGems: placedGems.map(serializeGem)
      };
    }

    function encodeLayout(layout) {
      const json = JSON.stringify(layout);
      const bytes = new TextEncoder().encode(json);
      let binary = "";
      bytes.forEach((byte) => {
        binary += String.fromCharCode(byte);
      });
      return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }

    function decodeLayout(payload) {
      const normalized = payload.replace(/-/g, "+").replace(/_/g, "/");
      const padded = normalized + "=".repeat((4 - normalized.length % 4) % 4);
      const binary = atob(padded);
      const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
      return JSON.parse(new TextDecoder().decode(bytes));
    }

    function hydrateLayout(parsed) {
      if (!parsed || !Array.isArray(parsed.stems)) return null;
      const savedStems = parsed.stems
        .filter((stem) => catalogById.has(stem.catalog))
        .map((stem) => makeStem(stem));
      savedStems.forEach((stem) => {
        if (!stem.note && configuredCards[stem.catalog]) {
          stem.note = createFlowerNote(stem);
        }
      });

      const maxUid = savedStems.reduce((max, stem) => {
        const value = Number(String(stem.uid).replace("stem-", ""));
        return Number.isFinite(value) ? Math.max(max, value) : max;
      }, 0);
      nextStemId = Math.max(Number(parsed.nextStemId) || 1, maxUid + 1);
      const loadedOrbits = Array.isArray(parsed.nameOrbits)
        ? parsed.nameOrbits.filter((orbit) => orbit && orbit.version === ORBIT_VERSION && catalogById.has(orbit.catalog) && orbit.path)
        : [];
      const savedOrbits = pruneLoadedNameOrbits(loadedOrbits);
      nameOrbits.splice(0, nameOrbits.length, ...savedOrbits);
      const maxOrbitUid = savedOrbits.reduce((max, orbit) => {
        const value = Number(String(orbit.uid).replace("orbit-", ""));
        return Number.isFinite(value) ? Math.max(max, value) : max;
      }, 0);
      nextOrbitId = Math.max(Number(parsed.nextOrbitId) || 1, maxOrbitUid + 1);
      const savedGems = Array.isArray(parsed.placedGems)
        ? parsed.placedGems.map((gem) => makeGem(gem)).filter(Boolean)
        : [];
      const maxGemUid = savedGems.reduce((max, gem) => {
        const value = Number(String(gem.uid).replace("gem-", ""));
        return Number.isFinite(value) ? Math.max(max, value) : max;
      }, 0);
      nextGemId = Math.max(Number(parsed.nextGemId) || 1, maxGemUid + 1);
      return {
        stems: savedStems,
        activeId: parsed.activeId,
        placedGems: savedGems
      };
    }

    function loadHashLayout() {
      try {
        const hash = window.location.hash || "";
        const prefix = "#gift=";
        if (!hash.startsWith(prefix)) return null;
        return hydrateLayout(decodeLayout(hash.slice(prefix.length)));
      } catch (error) {
        return null;
      }
    }

    function syncHomesToCurrent() {
      stems.forEach((stem) => {
        stem.home = {
          x: stem.x,
          y: stem.y,
          w: stem.w,
          r: stem.r || 0,
          flip: stem.flip || 1
        };
      });
    }

    function loadSavedLayout() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        return hydrateLayout(JSON.parse(raw));
      } catch (error) {
        return null;
      }
    }

    function persistPrunedLocalLayout() {
      if (!didPruneNameOrbits || hashLayout) return;
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(getLayoutSnapshot()));
      } catch (error) {
        // Ignore storage failures; the current page still uses the pruned layout.
      }
    }

    function setGiftMode(next) {
      isGiftMode = next;
      document.body.classList.toggle("gift-mode", isGiftMode);
      if (isGiftMode) {
        dragState = null;
        dragPoint = null;
        if (dragFrame) {
          cancelAnimationFrame(dragFrame);
          dragFrame = 0;
        }
        setPerformanceEditing(false);
        activeId = null;
        setActiveGem(null);
        document.querySelectorAll(".stem-item").forEach((el) => {
          el.classList.remove("selected");
        });
      } else {
        setActive(activeId);
      }
    }

    function saveLayout() {
      try {
        const layout = getLayoutSnapshot();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(layout));
        window.location.hash = `gift=${encodeLayout(layout)}`;
        syncHomesToCurrent();
        setGiftMode(true);
        saveBtn.textContent = "已保存";
        saveBtn.classList.add("saved");
        window.setTimeout(() => {
          saveBtn.textContent = "保存";
          saveBtn.classList.remove("saved");
        }, 1400);
      } catch (error) {
        saveBtn.textContent = "保存失败";
        window.setTimeout(() => {
          saveBtn.textContent = "保存";
        }, 1600);
      }
    }

    function applyDragFrame() {
      dragFrame = 0;
      if (isGiftMode || !dragState || !dragPoint) return;

      const dx = (dragPoint.x - dragState.startX) / stageScale;
      const dy = (dragPoint.y - dragState.startY) / stageScale;

      if (dragState.mode === "note") {
        const stem = getStemData(dragState.uid);
        const note = stem && stem.note;
        if (!note) return;
        const noteW = note.w || 124;
        const noteH = note.h || 38;
        note.x = clamp(dragState.baseNoteX + dx, 8, 720 - noteW - 8);
        note.y = clamp(dragState.baseNoteY + dy, 12, 900 - noteH - 12);
        if (Math.hypot(dx, dy) > 3) {
          dragState.moved = true;
        }
        renderCallouts();
        return;
      }

      const data = getStemData(dragState.uid);
      if (!data) return;

      if (dragState.mode === "move") {
        data.x = clamp(dragState.baseX + dx, 42, 684);
        data.y = clamp(dragState.baseY + dy, 120, 760);
      } else if (dragState.mode === "resize") {
        const nextDistance = Math.hypot(dragPoint.x - dragState.center.x, dragPoint.y - dragState.center.y) || 1;
        data.w = clamp(dragState.baseW * (nextDistance / dragState.baseDistance), 92, 520);
      } else if (dragState.mode === "rotate") {
        const nextAngle = Math.atan2(dragPoint.y - dragState.center.y, dragPoint.x - dragState.center.x) * 180 / Math.PI;
        data.r = normalizeAngle(dragState.baseR + nextAngle - dragState.startAngle);
      }
      updateStemElement(data);
      renderCallouts();
    }

    function handleDrag(event) {
      if (isGiftMode || !dragState) return;
      event.preventDefault();
      dragPoint = {
        x: event.clientX,
        y: event.clientY
      };
      if (!dragFrame) {
        dragFrame = requestAnimationFrame(applyDragFrame);
      }
    }

    function stopDrag(event) {
      const stoppedState = dragState;
      if (dragState && dragPoint && dragFrame) {
        cancelAnimationFrame(dragFrame);
        applyDragFrame();
      }
      dragPoint = null;
      dragFrame = 0;
      dragState = null;
      setPerformanceEditing(false);
      if (stoppedState && stoppedState.mode === "note" && event && event.type !== "pointercancel") {
        suppressNextNoteClick(stoppedState.uid);
        if (!stoppedState.moved) {
          openFlowerNoteModal(stoppedState.uid);
        }
      }
    }

    function openPlaqueModal() {
      plaqueModal.classList.add("open");
      plaqueModal.setAttribute("aria-hidden", "false");
      plaqueClose.focus({ preventScroll: true });
    }

    function closePlaqueModal() {
      plaqueModal.classList.remove("open");
      plaqueModal.setAttribute("aria-hidden", "true");
      trophyPlaque.focus({ preventScroll: true });
    }

    function openFlowerNoteModal(uid) {
      const stem = getStemData(uid);
      if (!stem || !stem.note) return;
      const visual = applyNoteVisual(stem.catalog);
      noteFlowerPreview.src = assetSrc(ASSET_BASE, stem.src);
      noteFlowerPreviewSecondary.src = assetSrc(ASSET_BASE, stem.src);
      noteCardTitle.textContent = stem.note.title;
      noteCardText.textContent = stem.note.text;
      updateNoteCardOrbitText(visual.title, stem.note.title);
      flowerNoteModal.classList.add("open");
      flowerNoteModal.setAttribute("aria-hidden", "false");
      flowerNoteClose.focus({ preventScroll: true });
    }

    function closeFlowerNoteModal() {
      flowerNoteModal.classList.remove("open");
      flowerNoteModal.setAttribute("aria-hidden", "true");
    }

    function clearSelectionFromBlank(event) {
      if (isGiftMode || dragState) return;
      const target = event.target;
      if (
        target.closest(".stem-item") ||
        target.closest(".callout-layer") ||
        target.closest(".toolbar") ||
        target.closest(".palette") ||
        target.closest(".save-btn") ||
        target.closest(".trophy-plaque") ||
        target.closest(".plaque-dialog") ||
        target.closest(".flower-note-dialog")
      ) {
        return;
      }
      setActive(null);
    }

    mirrorBtn.addEventListener("click", () => {
      if (isGiftMode) return;
      flipStem();
    });

    sendBackBtn.addEventListener("click", () => {
      if (isGiftMode) return;
      sendStemToBack();
    });

    sizeDownBtn.addEventListener("click", () => {
      if (isGiftMode) return;
      resizeStem(getStemData(), -16);
    });

    sizeUpBtn.addEventListener("click", () => {
      if (isGiftMode) return;
      resizeStem(getStemData(), 16);
    });

    deleteBtn.addEventListener("click", () => {
      deleteStem();
    });

    resetBtn.addEventListener("click", () => {
      if (isGiftMode) return;
      resetActiveStem();
    });

    saveBtn.addEventListener("click", saveLayout);
    trophyPlaque.addEventListener("click", openPlaqueModal);
    plaqueBackdrop.addEventListener("click", closePlaqueModal);
    plaqueClose.addEventListener("click", closePlaqueModal);
    flowerNoteBackdrop.addEventListener("click", closeFlowerNoteModal);
    flowerNoteClose.addEventListener("click", closeFlowerNoteModal);
    paletteTabs.forEach((tab) => {
      tab.addEventListener("click", () => switchPalettePanel(tab.dataset.paletteTab));
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && activeGemId) {
        setActiveGem(null);
      }
      if (event.key === "Escape" && plaqueModal.classList.contains("open")) {
        closePlaqueModal();
      }
      if (event.key === "Escape" && flowerNoteModal.classList.contains("open")) {

      }
    });

    function resizeStage() {
      stageScale = Math.min(window.innerWidth / 900, window.innerHeight / 980, 1);
      stage.style.transform = `translate(-50%, -50%) scale(${stageScale})`;
    }

    stemsRoot.addEventListener("pointerdown", handleStemLayerPointerDown, { capture: true });
    window.addEventListener("pointermove", handleDrag, { passive: false });
    window.addEventListener("pointerdown", handleGemPlacement, { capture: true });
    window.addEventListener("pointerdown", clearSelectionFromBlank);
    window.addEventListener("pointerup", stopDrag);
    window.addEventListener("pointercancel", stopDrag);
    document.addEventListener("visibilitychange", () => {
      updateAllNameOrbitAnimationStates();
    });

    const halo = document.getElementById("halo");
    const ctx = halo.getContext("2d");
    const HALO_FRAME_INTERVAL = 1000 / 24;
    const PARTICLE_ALPHA_STEPS = 64;
    const particlePalette = [
      [12, 55, 152],
      [18, 82, 196],
      [41, 122, 232],
      [88, 167, 249],
      [133, 203, 255],
      [73, 111, 205]
    ];
    const particleColorCache = new Map();
    let dpr = 1;
    let w = 0;
    let h = 0;
    let particles = [];
    let lastHaloFrameTime = 0;

    function seededRandom(seed) {
      return () => {
        seed = (seed * 1664525 + 1013904223) >>> 0;
        return seed / 4294967296;
      };
    }

    function gaussian(rand) {
      const u = 1 - rand();
      const v = 1 - rand();
      return Math.sqrt(-2 * Math.log(u)) * Math.cos(Math.PI * 2 * v);
    }

    function smoothstep(edge0, edge1, value) {
      const x = clamp((value - edge0) / (edge1 - edge0), 0, 1);
      return x * x * (3 - 2 * x);
    }

    function resizeCanvas() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = Math.floor(window.innerWidth);
      h = Math.floor(window.innerHeight);
      halo.width = Math.floor(w * dpr);
      halo.height = Math.floor(h * dpr);
      halo.style.width = `${w}px`;
      halo.style.height = `${h}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const rand = seededRandom(92841);
      const lobes = [
        { x: .5, y: .42, sx: .14, sy: .14 },
        { x: .39, y: .58, sx: .16, sy: .13 },
        { x: .62, y: .58, sx: .17, sy: .14 },
        { x: .5, y: .74, sx: .13, sy: .1 },
        { x: .5, y: .26, sx: .12, sy: .13 },
        { x: .18, y: .28, sx: .22, sy: .2 },
        { x: .82, y: .26, sx: .22, sy: .2 },
        { x: .18, y: .72, sx: .23, sy: .18 },
        { x: .84, y: .72, sx: .24, sy: .18 },
        { x: .5, y: .16, sx: .32, sy: .1 },
        { x: .5, y: .9, sx: .34, sy: .12 }
      ];
      const count = clamp(Math.floor((w * h) / 26), 42000, 86000);
      particles = Array.from({ length: count }, (_, i) => {
        const isDust = rand() < .46;
        const isStream = !isDust && rand() < .66;
        const lobe = lobes[Math.floor(rand() * lobes.length)];
        const lane = Math.floor(rand() * 15);
        const u = rand();
        return {
          nx: isDust
            ? rand()
            : isStream
              ? -.14 + u * 1.28 + gaussian(rand) * .014
              : lobe.x + gaussian(rand) * lobe.sx,
          ny: isDust
            ? rand()
            : isStream
              ? -.08 + lane * .079 + Math.sin(u * 16.5 + lane * .9) * .068 + gaussian(rand) * .022
              : lobe.y + gaussian(rand) * lobe.sy,
          z: rand(),
          phase: rand() * Math.PI * 2,
          phase2: rand() * Math.PI * 2,
          size: .42 + rand() * .9,
          shade: Math.floor(rand() * 6),
          dust: isDust,
          stream: isStream
        };
      });
      particles.forEach((particle) => {
        particle.baseX = particle.nx * w;
        particle.baseY = particle.ny * h;
      });
      resizeStage();
    }

    function particleColor(shade, alpha) {
      const colorIndex = shade % particlePalette.length;
      const alphaStep = clamp(Math.round(alpha * PARTICLE_ALPHA_STEPS), 0, PARTICLE_ALPHA_STEPS);
      const cacheKey = `${colorIndex}-${alphaStep}`;
      if (particleColorCache.has(cacheKey)) return particleColorCache.get(cacheKey);
      const [r, g, b] = particlePalette[colorIndex];
      const color = `rgba(${r}, ${g}, ${b}, ${(alphaStep / PARTICLE_ALPHA_STEPS).toFixed(3)})`;
      particleColorCache.set(cacheKey, color);
      return color;
    }

    function drawHalo(time) {
      requestAnimationFrame(drawHalo);
      if (document.hidden || isPerformanceEditing) return;
      if (time - lastHaloFrameTime < HALO_FRAME_INTERVAL) return;
      lastHaloFrameTime = time;
      const t = time * .001;
      ctx.clearRect(0, 0, w, h);

      const cx = w * .5;
      const cy = h * .49;
      const driftX = Math.sin(t * .18) * w * .045;
      const driftY = Math.cos(t * .15) * h * .04;

      ctx.save();
      ctx.globalCompositeOperation = "multiply";

      particles.forEach((p, i) => {
        const baseX = p.baseX;
        const baseY = p.baseY;
        const rx = baseX - cx;
        const ry = baseY - cy;
        const depth = .28 + p.z * .96;
        const waveA = Math.sin(ry * .011 + t * (1.1 + p.z * .56) + p.phase);
        const waveB = Math.cos(rx * .008 - t * (.88 + p.z * .42) + p.phase2);
        const waveField = Math.sin(baseX * .012 + t * 1.35 + p.phase * .22) * Math.cos(baseY * .008 - t * .82 + p.phase2 * .16);
        const fold = Math.sin((rx + ry) * .006 + Math.sin(ry * .01 + t * .62) * 2.6 - t * 1.42 + p.phase * .34);
        const x = baseX + driftX + waveA * (24 + depth * 52) + fold * (12 + p.z * 28);
        const y = baseY + driftY + waveB * (18 + depth * 34) + waveField * (18 + p.z * 38);
        const dx = (x - (cx + driftX * .45)) / (w * .31);
        const dy = (y - (cy + driftY * .4)) / (h * .39);
        const distance = Math.sqrt(dx * dx + dy * dy);
        const core = 1 - smoothstep(.34, 1.02, distance);
        const edge = 1 - smoothstep(.9, 1.13, distance);
        const ridge = Math.pow(Math.max(0, Math.sin(x * .015 + y * .019 + Math.sin(y * .008 + t * .62) * 1.9 - t * 1.55 + p.phase * .28)), 2.15);
        const counterRidge = Math.pow(Math.max(0, Math.sin(x * -.019 + y * .013 + t * 1.22 + p.phase2)), 2.55);
        const wideFalloff = 1 - smoothstep(1.18, 2.75, distance);
        const globalWave = Math.pow(Math.max(0, Math.sin(x * .01 + Math.sin(y * .006 + t * .46) * 3.6 - t * 1.28 + p.phase2)), 1.7);
        const farRibbon = Math.pow(Math.max(0, Math.sin(y * .024 + Math.cos(x * .006 + t * .34) * 4.8 - t * 1.78 + p.phase)), 2.1);
        const streamWave = Math.pow(Math.max(0, Math.sin(y * .038 + Math.sin(x * .007 + t * .55) * 3.2 - t * 2.15 + p.phase)), 1.8);
        const streamBand = p.stream
          ? (.12 + p.z * .22) * (.22 + wideFalloff * .58 + globalWave * .48 + farRibbon * .42) * (.25 + streamWave * .82)
          : 0;
        const dust = p.dust ? (.022 + p.z * .026) * (.38 + globalWave * .85 + farRibbon * .7) : 0;
        const alpha = (dust + streamBand + core * (.08 + p.z * .12) + ridge * edge * (.28 + p.z * .36) + counterRidge * wideFalloff * .22) * (p.dust ? .88 : 1);
        if (alpha < .02 || x < -8 || x > w + 8 || y < -8 || y > h + 8) return;
        const size = p.size * (.62 + p.z * 1.05);
        ctx.fillStyle = particleColor(p.shade, Math.min(alpha, .92));
        ctx.fillRect(x, y, size, size);

        if (i % 520 === 0 && core > .34) {
          ctx.globalCompositeOperation = "screen";
          ctx.fillStyle = `rgba(255, 255, 255, ${.28 + p.z * .18})`;
          ctx.fillRect(x - size * 2, y - size * 2, size * 4, size * 4);
          ctx.globalCompositeOperation = "multiply";
        }
      });
      ctx.restore();
    }

    window.addEventListener("resize", resizeCanvas);

    function applyGiftCopy() {
      const recipient = configuredGiftCopy.recipient;
      const message = configuredGiftCopy.message;
      if (!recipient && !message) return;
      document.querySelectorAll(".trophy-plaque span:first-child, .plaque-large-message span:first-child").forEach((element) => {
        if (recipient) element.textContent = recipient;
      });
      document.querySelectorAll(".gift-card .message, .trophy-plaque span:last-child, .plaque-large-message span:last-child").forEach((element) => {
        if (message) element.textContent = message;
      });
    }

    applyGiftCopy();
    renderStems();
    renderPalette();
    renderGemPalette();
    renderPlacedGems();
    renderNameOrbits();
    persistPrunedLocalLayout();
    setGiftMode(isGiftMode);
    resizeCanvas();
    requestAnimationFrame(drawHalo);
  </script>
</body>
</html>
