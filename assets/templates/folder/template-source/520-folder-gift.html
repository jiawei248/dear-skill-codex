<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>520 Memory Archive</title>
  <style>
    @font-face {
      font-family: "Lakeus";
      src: url("fonts/851LakeusNightWriting-Regular.ttf") format("truetype");
      font-display: swap;
    }

    @font-face {
      font-family: "Qingchun";
      src: url("fonts/平方青春体.ttf") format("truetype");
      font-display: swap;
    }

    @font-face {
      font-family: "Chaohua";
      src: url("fonts/字体家AI造字朝花.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      --ink: #332b24;
      --wine: #4b1717;
      --paper-line: rgba(86, 70, 53, .08);
      color-scheme: light;
      letter-spacing: 0;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Qingchun", "Chaohua", system-ui, sans-serif;
      color: var(--ink);
      background: var(--wine);
      overflow-x: hidden;
      letter-spacing: 0;
    }

    button {
      font: inherit;
      letter-spacing: 0;
    }

    .page {
      min-height: 100vh;
      padding: 18px 0 38px;
      background: var(--wine);
    }

    .archive {
      width: 100vw;
      margin: 0 auto;
      padding: 0 clamp(14px, 2.2vw, 36px);
    }

    .archive-head {
      display: flex;
      justify-content: space-between;
      gap: 32px;
      width: min(1460px, calc(100vw - clamp(28px, 7.3vw, 112px)));
      min-height: 78px;
      margin: 0 auto;
      padding: 6px 0 0;
      color: #fff6ea;
    }

    .archive-title {
      margin: 0;
      font-family: "Courier New", Courier, Menlo, monospace;
      font-size: clamp(.78rem, .96vw, .96rem);
      line-height: 1.23;
      font-weight: 700;
      letter-spacing: .13em;
      text-transform: uppercase;
      color: rgba(255, 249, 239, .84);
      text-shadow: 0 0 1px rgba(255,255,255,.28);
    }

    .archive-title span {
      display: block;
      margin-top: 2px;
    }

    .archive-title span:first-child {
      margin-top: 0;
    }

    .archive-note {
      max-width: 390px;
      margin: 0;
      font-family: "Chaohua", "Qingchun", sans-serif;
      font-size: clamp(1rem, 1.6vw, 1.22rem);
      line-height: 1.52;
      text-align: right;
      color: rgba(255,246,234,.9);
    }

    .folder-stack {
      --stack-scale: .9;
      position: relative;
      left: 50%;
      width: 108%;
      margin-top: -78px;
      perspective: 1600px;
      transform: translateX(-50%) scale(var(--stack-scale));
      transform-origin: top center;
    }

    .folder {
      --back: #c7bfab;
      --front: #f4efe6;
      --paper: #fff9ef;
      --edge: rgba(80, 64, 47, .25);
      --tab-title-x: 19.3%;
      --folder-front-top: 86px;
      --folder-paper-top: 303px;
      position: relative;
      display: block;
      width: 100%;
      height: 1180px;
      margin-top: -1000px;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      text-align: left;
      cursor: default;
      transform-style: preserve-3d;
    }

    .folder:first-child {
      margin-top: 0;
      cursor: pointer;
    }

    .folder:nth-child(1) { z-index: 10; }
    .folder:nth-child(2) { z-index: 20; }
    .folder:nth-child(3) { z-index: 30; }
    .folder:nth-child(4) { z-index: 40; }

    .folder:focus-visible {
      outline: 3px solid rgba(255,255,255,.85);
      outline-offset: 5px;
      border-radius: 22px;
    }

    .folder[data-side="right"] {
      --tab-title-x: 80.7%;
    }

    .folder[data-theme="cream"] {
      --back: #eadfba;
      --front: #fff8e8;
      --paper: #fffdf8;
    }

    .folder[data-theme="pink"] {
      --back: #f0c6d4;
      --front: #fde4ed;
      --paper: #fff8fa;
    }

    .folder[data-theme="blue"] {
      --back: #b9dcea;
      --front: #def5f9;
      --paper: #fbffff;
    }

    .folder[data-theme="sand"] {
      --back: #edcf97;
      --front: #ffebbf;
      --paper: #fffaf0;
    }

    .folder-svg {
      position: absolute;
      left: 0;
      width: 100%;
      overflow: visible;
      pointer-events: none;
    }

    .folder-back {
      top: 14px;
      z-index: 1;
      height: 1120px;
      filter: drop-shadow(0 20px 24px rgba(36,27,20,.13));
    }

    .folder-front {
      top: var(--folder-front-top);
      z-index: 9;
      height: 1048px;
      filter: drop-shadow(0 24px 28px rgba(34,25,19,.17));
    }

    .folder-shape {
      stroke: var(--edge);
      stroke-width: 1.1;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: url(#paperTexture);
    }

    .folder-back .folder-shape { fill: var(--back); }
    .folder-front .folder-shape { fill: var(--front); }

    .inner-paper {
      position: absolute;
      left: 2.2%;
      right: 2.2%;
      top: var(--folder-paper-top);
      height: 500px;
      z-index: 5;
      border: 1px solid rgba(96, 77, 55, .16);
      background:
        radial-gradient(circle at 14% 24%, rgba(117,91,60,.12) 0 1px, transparent 2px),
        radial-gradient(circle at 74% 38%, rgba(117,91,60,.09) 0 1px, transparent 2px),
        repeating-linear-gradient(0deg, transparent 0 22px, rgba(86, 70, 53, .13) 23px 24px),
        linear-gradient(90deg, rgba(255,255,255,.34), transparent 24%, rgba(123,97,66,.06) 78%, transparent),
        var(--paper);
      box-shadow:
        0 -6px 10px rgba(74, 54, 36, .09),
        inset 0 2px 3px rgba(255,255,255,.7),
        inset 0 -1px 2px rgba(82,62,43,.08);
      pointer-events: none;
    }

    .folder-lip {
      display: none;
    }

    .tab-title {
      position: absolute;
      left: var(--tab-title-x);
      top: 212px;
      z-index: 12;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 252px;
      height: 64px;
      color: rgba(47, 40, 34, .82);
      text-align: center;
      pointer-events: none;
      transform: translateX(-50%);
    }

    .tab-title strong {
      display: block;
      font-family: "Qingchun", "Chaohua", sans-serif;
      font-size: calc(clamp(.96rem, 1.28vw, 1.16rem) * var(--font-scale, 1));
      line-height: 1.05;
      font-weight: 400;
    }

    .tab-title span {
      display: block;
      margin-top: 5px;
      font-family: "Chaohua", "Qingchun", sans-serif;
      font-size: calc(clamp(.7rem, .88vw, .82rem) * var(--font-scale, 1));
      line-height: 1.22;
      color: rgba(52,44,38,.68);
    }

    .print,
    .film-strip,
    .asset,
    .paper-scrap,
    .tape {
      position: absolute;
      pointer-events: none;
      user-select: none;
    }

    .print {
      z-index: 8;
      background: #fffdf7;
      box-shadow: 0 12px 20px rgba(36,25,18,.2);
      overflow: hidden;
    }

    .print img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .polaroid {
      padding: 11px 11px 40px;
      overflow: visible;
    }

    .polaroid img {
      height: 100%;
      object-fit: cover;
    }

    .polaroid::after {
      content: attr(data-caption);
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 9px;
      font-family: "Lakeus", "Chaohua", cursive;
      font-size: .95rem;
      line-height: 1;
      color: #51443c;
      text-align: center;
    }

    .frame-note {
      border-radius: 7px 3px 9px 4px;
      background:
        linear-gradient(90deg, rgba(174,197,186,.32) 0 8px, transparent 8px),
        #fffdf4;
    }

    .frame-wide {
      padding: 10px 12px 34px;
      border: 1px solid rgba(78,67,55,.09);
    }

    .frame-square {
      padding: 12px 12px 32px;
      border-radius: 10px;
      background: #fffdf7;
    }

    .frame-dv {
      padding: 10px 10px 34px;
      border-radius: 5px;
      background:
        linear-gradient(90deg, rgba(63,75,82,.18) 0 9px, transparent 9px calc(100% - 9px), rgba(63,75,82,.18) calc(100% - 9px)),
        #fffdf7;
    }

    .frame-dv::before {
      content: "REC";
      position: absolute;
      right: 14px;
      top: 12px;
      z-index: 2;
      font-family: system-ui, sans-serif;
      font-size: .58rem;
      letter-spacing: .08em;
      color: rgba(150,45,35,.72);
    }

    .frame-ripped {
      padding: 14px 12px 34px;
      border-radius: 12px 4px 11px 5px;
      clip-path: polygon(1% 7%, 7% 1%, 20% 5%, 33% 1%, 47% 4%, 61% 1%, 80% 4%, 98% 2%, 97% 94%, 84% 98%, 68% 95%, 52% 99%, 36% 96%, 18% 99%, 2% 94%);
    }

    .frame-postcard {
      padding: 12px 52px 34px 12px;
      border: 1px solid rgba(91,75,60,.12);
      background:
        linear-gradient(90deg, transparent 0 calc(100% - 48px), rgba(194,172,126,.16) calc(100% - 48px)),
        #fffdf7;
    }

    .film-strip {
      z-index: 8;
      display: grid;
      gap: 7px;
      width: 112px;
      padding: 11px 13px;
      border-radius: 4px;
      background: #202220;
      box-shadow: 0 14px 22px rgba(31,21,15,.24);
    }

    .film-strip::before,
    .film-strip::after {
      content: "";
      position: absolute;
      top: 9px;
      bottom: 9px;
      width: 5px;
      background: repeating-linear-gradient(180deg, #fff4e4 0 5px, transparent 5px 12px);
    }

    .film-strip::before { left: 4px; }
    .film-strip::after { right: 4px; }

    .film-strip img {
      display: block;
      width: 100%;
      aspect-ratio: 1 / .74;
      object-fit: cover;
      object-position: center 28%;
    }

    .asset {
      z-index: 7;
      display: block;
      height: auto;
      filter: drop-shadow(0 9px 9px rgba(32,22,16,.17));
    }

    .paper-scrap {
      z-index: 7;
      display: block;
      height: auto;
      opacity: .78;
      filter: drop-shadow(0 8px 10px rgba(43,31,22,.13));
      mix-blend-mode: multiply;
    }

    .tape {
      z-index: 8;
      width: 72px;
      height: 28px;
      background: rgba(204,164,88,.58);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.22);
      mix-blend-mode: multiply;
    }

    .folder.launching {
      animation: launchFolder 560ms cubic-bezier(.2,.78,.18,1) forwards;
    }

    @keyframes launchFolder {
      0% { transform: translateY(0) scale(1) rotateX(0); opacity: 1; }
      58% { transform: translateY(22px) scale(.86) rotateX(7deg); opacity: .74; }
      100% { transform: translateY(56px) scale(.62) rotateX(12deg); opacity: .08; }
    }

    .memory-stage {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: grid;
      place-items: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 280ms ease;
    }

    .memory-stage.active {
      opacity: 1;
      pointer-events: auto;
    }

    .stage-backdrop {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(44,24,22,.78), rgba(75,35,39,.85)),
        linear-gradient(90deg, rgba(255,255,255,.09) 1px, transparent 1px) 0 0 / 66px 66px,
        linear-gradient(0deg, rgba(255,255,255,.08) 1px, transparent 1px) 0 0 / 66px 66px;
      backdrop-filter: blur(8px);
    }

    .close-stage {
      position: absolute;
      right: 22px;
      top: 20px;
      z-index: 6;
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border: 2px solid rgba(85,64,50,.18);
      border-radius: 50%;
      background: rgba(255,250,242,.93);
      color: #4b382f;
      cursor: pointer;
      font-family: system-ui, sans-serif;
      font-size: 1.45rem;
      line-height: 1;
      box-shadow: 0 10px 20px rgba(24,16,12,.2);
    }

    .open-folder {
      position: relative;
      z-index: 2;
      width: min(780px, 84vw, 68vh);
      aspect-ratio: 3 / 4;
      min-height: 0;
      perspective: 1800px;
      transform-style: preserve-3d;
      transform: translateY(170px) scale(.56) rotateX(12deg);
      opacity: 0;
      transition: transform 760ms cubic-bezier(.2,.86,.18,1), opacity 260ms ease;
    }

    .memory-stage.centered .open-folder {
      opacity: 1;
      transform: translateY(0) scale(1) rotateX(0deg);
    }

    .three-folder {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: block;
      width: 100%;
      height: 100%;
      opacity: 0;
      mix-blend-mode: multiply;
      pointer-events: none;
      transition: opacity 220ms ease;
    }

    .memory-stage.unfolded .three-folder {
      opacity: .46;
    }

    .spread {
      position: absolute;
      inset: 0;
      z-index: 4;
      opacity: 0;
      transform-style: preserve-3d;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    .memory-stage.unfolded .spread {
      opacity: 1;
    }

    .leaf {
      position: absolute;
      left: 0;
      width: 100%;
      height: 50%;
      transform-style: preserve-3d;
      will-change: top, transform;
      backface-visibility: visible;
    }

    .leaf svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
      filter: drop-shadow(0 24px 30px rgba(28,20,16,.24));
    }

    .bottom-leaf svg {
      transform: rotate(180deg);
      transform-origin: center center;
    }

    .leaf .top-open-shape,
    .leaf .bottom-open-shape {
      fill: url(#openFolderPaper);
      filter: url(#openFolderTexture);
      stroke: rgba(92,70,44,.25);
      stroke-width: 1.1;
    }

    .leaf .fold-shadow {
      fill: url(#openFoldShadow);
      opacity: .58;
      stroke: none;
      mix-blend-mode: multiply;
    }

    .top-leaf {
      top: 25%;
      z-index: 4;
      transform-origin: center bottom;
      transform: translateZ(56px) rotateX(0deg);
    }

    .bottom-leaf {
      top: 25%;
      z-index: 3;
      transform-origin: center top;
      transform: translateZ(22px) rotateX(0deg);
    }

    .memory-stage.unfolded .top-leaf {
      animation: openTopLeaf 1160ms cubic-bezier(.16,.84,.18,1) forwards;
    }

    .memory-stage.unfolded .bottom-leaf {
      animation: openBottomLeaf 1160ms cubic-bezier(.16,.84,.18,1) forwards;
    }

    @keyframes openTopLeaf {
      0% {
        top: 25%;
        transform: translateZ(56px) rotateX(0deg);
      }
      48% {
        top: 9%;
        transform: translateZ(168px) rotateX(-68deg);
      }
      100% {
        top: 0;
        transform: translateZ(44px) rotateX(0deg);
      }
    }

    @keyframes openBottomLeaf {
      0% {
        top: 25%;
        transform: translateZ(22px) rotateX(0deg);
      }
      48% {
        top: 42%;
        transform: translateZ(132px) rotateX(58deg);
      }
      100% {
        top: 50%;
        transform: translateZ(30px) rotateX(0deg);
      }
    }

    .hinge-line {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      z-index: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(95,72,43,.24) 12% 88%, transparent);
      transform: translateZ(6px);
      opacity: 0;
      transition: opacity 360ms ease 760ms;
    }

    .memory-stage.unfolded .hinge-line {
      opacity: 1;
    }

    .open-content {
      position: absolute;
      inset: 0;
      z-index: 8;
      opacity: 0;
      transform-style: preserve-3d;
      pointer-events: none;
      clip-path: none;
      overflow: visible;
      transition: opacity 560ms ease 80ms;
    }

    .memory-stage.contents-ready .open-content {
      z-index: 8;
      opacity: 1;
    }

    .open-content-plane {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 100%;
      opacity: 1;
      transform-style: preserve-3d;
      pointer-events: none;
      will-change: transform, opacity;
    }

    .top-content-plane {
      z-index: 2;
      clip-path: inset(-12% 3% 48% 3% round 24px);
      transform-origin: center bottom;
      transform: translateZ(44px) translateY(0) scale(.82) rotateX(-10deg);
    }

    .bottom-content-plane {
      z-index: 1;
      clip-path: inset(48% 3% -10% 3% round 24px);
      transform-origin: center top;
      transform: translateZ(34px) translateY(0) scale(.82) rotateX(10deg);
    }

    .memory-stage.unfolded .top-content-plane {
      animation: settleTopContentPlane 1160ms cubic-bezier(.16,.84,.18,1) forwards;
    }

    .memory-stage.unfolded .bottom-content-plane {
      animation: settleBottomContentPlane 1160ms cubic-bezier(.16,.84,.18,1) forwards;
    }

    @keyframes settleTopContentPlane {
      0% {
        top: 0;
        height: 100%;
        opacity: .9;
        transform: translateZ(42px) translateY(0) scale(.82) rotateX(-10deg);
      }
      48% {
        top: 0;
        height: 100%;
        opacity: .96;

    function deepMerge(base, override) {
      if (override === undefined) return base;
      if (Array.isArray(base) || Array.isArray(override)) return override ?? base;
      if (!isPlainObject(base) || !isPlainObject(override)) return override;
      const result = { ...base };
      Object.entries(override).forEach(([key, value]) => {
        result[key] = key in result ? deepMerge(result[key], value) : value;
      });
      return result;

      if (!node || value === undefined || value === null) return;
      if (isPlainObject(value) && value.html !== undefined) {
        node.innerHTML = value.html;

      }
      node.textContent = isPlainObject(value) && value.text !== undefined ? value.text : value;
    }

    function applySelectorTextReplacements(replacements) {
      if (!replacements) return;
      const items = Array.isArray(replacements)

      items.forEach((item) => {
        if (!item || !item.selector) return;
        document.querySelectorAll(item.selector).forEach((node) => {
          setNodeContent(node, item.value ?? item.text ?? item);

    function applySelectorImageReplacements(replacements) {

      items.forEach((item) => {

    function applyThumbnailLayout() {
      const mobile = window.matchMedia("(max-width: 820px)").matches;
      const stackConfig = mobile ? thumbnailLayoutConfig.folderStack.mobile : thumbnailLayoutConfig.folderStack.desktop;
      document.querySelector(".folder-stack")?.style.setProperty("--stack-scale", stackConfig.scale);

      const rows = thumbnailLayoutConfig.desktop;
      Object.entries(rows).forEach(([rowName, rowConfig]) => {
        const row = document.querySelector(`.${rowName}`);
        if (!row) return;
        const rowOverride = mobile ? thumbnailLayoutConfig.mobile[rowName] || {} : {};
        Object.entries(rowConfig).forEach(([itemName, baseConfig]) => {
          const element = row.querySelector(`[data-layout="${itemName}"]`);
          if (!element) return;
          applyLayoutConfig(element, { ...baseConfig, ...(rowOverride[itemName] || {}) });
        });
      });
      applyOpenLayout();
      applyClosedPreviewLayout();
    }

    function applyOpenLayout() {
      Object.entries(openLayoutConfig).forEach(([itemName, config]) => {
        const element = document.querySelector(`[data-open-layout="${itemName}"]`);
        if (!element) return;
        applyLayoutConfig(element, config);
      });
    }

    function applyClosedPreviewLayout() {
      Object.entries(closedPreviewConfig).forEach(([itemName, config]) => {
        const element = document.querySelector(`[data-closed-layout="${itemName}"]`);
        if (!element) return;
        applyLayoutConfig(element, config);
      });
    }

    function applyLayoutConfig(element, config) {
      const toCss = (value) => typeof value === "number" ? `${value}px` : value;
      const setBoxValue = (prop, value) => {
        if (value === undefined) return;
        element.style[prop] = value === null ? "" : toCss(value);
      };

      ["left", "right", "top", "bottom", "width", "height"].forEach((prop) => {
        element.style[prop] = "";
      });
      element.style.opacity = "";
      element.style.zIndex = "";
      element.style.fontFamily = "";
      element.style.fontSize = "";
      element.style.lineHeight = "";
      element.style.letterSpacing = "";
      element.style.color = "";
      element.style.textAlign = "";
      element.style.padding = "";
      element.style.removeProperty("--font-scale");
      element.style.display = config.display || "";
      setBoxValue("left", config.x);
      setBoxValue("right", config.right);
      setBoxValue("top", config.y);
      setBoxValue("bottom", config.bottom);
      setBoxValue("width", config.w);
      setBoxValue("height", config.h);
      if (config.z !== undefined) element.style.zIndex = config.z;
      if (config.opacity !== undefined) element.style.opacity = config.opacity;
      if (config.fontScale !== undefined) element.style.setProperty("--font-scale", config.fontScale);
      if (config.fontFamily !== undefined) element.style.fontFamily = config.fontFamily;
      if (config.fontSize !== undefined) element.style.fontSize = toCss(config.fontSize);
      if (config.lineHeight !== undefined) element.style.lineHeight = config.lineHeight;
      if (config.letterSpacing !== undefined) element.style.letterSpacing = toCss(config.letterSpacing);
      if (config.color !== undefined) element.style.color = config.color;
      if (config.textAlign !== undefined) element.style.textAlign = config.textAlign;
      if (config.padding !== undefined) element.style.padding = toCss(config.padding);

      const transforms = [];
      const depth = config.depth !== undefined ? config.depth : config.tz;
      if (config.anchor === "centerX") transforms.push("translateX(-50%)");
      if (config.r !== undefined) transforms.push(`rotate(${config.r}deg)`);
      if (depth !== undefined) transforms.push(`translateZ(${depth}px)`);
      if (config.scale !== undefined) transforms.push(`scale(${config.scale})`);
      element.style.transform = transforms.join(" ");

      if (config.imagePosition) {
        element.querySelectorAll("img").forEach((image) => {
          image.style.objectPosition = config.imagePosition;
        });
      }
    }

    window.folderRuntimeConfig = folderRuntimeConfig;
    window.thumbnailLayoutConfig = thumbnailLayoutConfig;
    window.openLayoutConfig = openLayoutConfig;
    window.closedPreviewConfig = closedPreviewConfig;
    applyFolderRuntimeContent();
    applyThumbnailLayout();
    window.addEventListener("resize", applyThumbnailLayout);
  </script>

  <script>
    const stage = document.getElementById("memoryStage");
    const closeStage = document.getElementById("closeStage");
    const firstFolder = document.querySelector("[data-open-folder='supermarket']");
    const photoLightbox = document.getElementById("photoLightbox");
    const photoLightboxImage = document.getElementById("photoLightboxImage");
    const photoLightboxClose = document.getElementById("photoLightboxClose");
    let centerTimer = 0;
    let unfoldTimer = 0;
    let contentTimer = 0;

    function openMemory() {
      window.clearTimeout(centerTimer);
      window.clearTimeout(unfoldTimer);
      window.clearTimeout(contentTimer);
      firstFolder.classList.add("launching");
      stage.classList.remove("contents-ready");
      stage.classList.add("active");
      stage.setAttribute("aria-hidden", "false");
      window.dispatchEvent(new CustomEvent("folder-open-start"));
      centerTimer = window.setTimeout(() => stage.classList.add("centered"), 80);
      unfoldTimer = window.setTimeout(() => {
        stage.classList.add("unfolded");
        window.dispatchEvent(new CustomEvent("folder-unfold"));
        contentTimer = window.setTimeout(() => stage.classList.add("contents-ready"), 1180);
        closeStage.focus({ preventScroll: true });
      }, 820);
    }

    function closeMemory() {
      window.clearTimeout(centerTimer);
      window.clearTimeout(unfoldTimer);
      window.clearTimeout(contentTimer);
      stage.classList.remove("contents-ready", "unfolded", "centered", "active");
      stage.setAttribute("aria-hidden", "true");
      firstFolder.classList.remove("launching");
      window.dispatchEvent(new CustomEvent("folder-close"));
      firstFolder.focus({ preventScroll: true });
    }

    firstFolder.addEventListener("click", openMemory);
    closeStage.addEventListener("click", closeMemory);
    stage.addEventListener("click", (event) => {
      if (event.target === stage || event.target.classList.contains("stage-backdrop")) closeMemory();
    });

    function openPhotoLightbox(image) {
      photoLightboxImage.src = image.currentSrc || image.src;
      photoLightboxImage.alt = image.alt || "放大的照片";
      photoLightbox.classList.add("active");
      photoLightbox.setAttribute("aria-hidden", "false");
      photoLightboxClose.focus({ preventScroll: true });
    }

    function closePhotoLightbox() {
      photoLightbox.classList.remove("active");
      photoLightbox.setAttribute("aria-hidden", "true");
      photoLightboxImage.removeAttribute("src");
    }

    document.addEventListener("click", (event) => {
      const image = event.target.closest(".print img, .film-strip img, .open-polaroid img, .open-quad img, .open-mini-photo img, .closed-print img");
      if (!image) return;
      event.preventDefault();
      event.stopPropagation();
      openPhotoLightbox(image);
    }, true);

    photoLightbox.addEventListener("click", (event) => {
      if (event.target === photoLightbox || event.target === photoLightboxClose) closePhotoLightbox();
    });

    window.addEventListener("keydown", (event) => {
      if (event.key !== "Escape") return;
      if (photoLightbox.classList.contains("active")) {
        closePhotoLightbox();
        return;
      }
      if (stage.classList.contains("active")) closeMemory();
    });
  </script>

  <script>
    window.__threeFolderReady = false;
    const canvas = document.getElementById("threeFolder");
    let renderer;
    const probeCanvas = document.createElement("canvas");
    const THREE = window.THREE;
    const canUseWebGL = Boolean(THREE && window.WebGLRenderingContext && (probeCanvas.getContext("webgl2") || probeCanvas.getContext("webgl")));

    if (!canUseWebGL) {
      window.__threeFolderReady = "webgl-unavailable";
      canvas.hidden = true;
    } else try {
      renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(32, 1, 0.1, 100);
      camera.position.set(0, 0, 8.1);
      scene.add(new THREE.AmbientLight(0xffffff, 1.35));

      const keyLight = new THREE.DirectionalLight(0xffffff, 1.1);
      keyLight.position.set(2.5, 4.5, 5);
      scene.add(keyLight);

      const rimLight = new THREE.DirectionalLight(0xfff0c8, .5);
      rimLight.position.set(-4, -3, 5);
      scene.add(rimLight);

      const folder3d = {
        width: 4,
        height: 3,
        segments: 48
      };

      function createPanel(color, yOffset) {
        const geometry = new THREE.PlaneGeometry(folder3d.width, folder3d.height, folder3d.segments, 6);
        const original = new Float32Array(geometry.attributes.position.array);
        const material = new THREE.MeshStandardMaterial({
          color,
          transparent: true,
          opacity: .26,
          roughness: .82,
          metalness: 0,
          side: THREE.DoubleSide
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.y = yOffset;
        return { mesh, original };
      }

      const topGroup = new THREE.Group();
      const bottomGroup = new THREE.Group();
      const topPanel = createPanel(0xf4d99b, folder3d.height / 2);
      const bottomPanel = createPanel(0xf4d99b, -folder3d.height / 2);
      topGroup.add(topPanel.mesh);
      bottomGroup.add(bottomPanel.mesh);
      scene.add(topGroup, bottomGroup);

      let targetOpen = 0;
      let progress = 0;

      function resize() {
        const rect = canvas.getBoundingClientRect();
        const width = Math.max(1, Math.floor(rect.width));
        const height = Math.max(1, Math.floor(rect.height));
        renderer.setSize(width, height, false);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
      }

      function bendPanel(panel, progress, direction) {
        const positionAttribute = panel.mesh.geometry.attributes.position;
        const bendStrength = Math.sin(progress * Math.PI) * .54 * direction;

        for (let index = 0; index < positionAttribute.count; index += 1) {
          const offset = index * 3;
          const x = panel.original[offset];
          const y = panel.original[offset + 1];
          const z = panel.original[offset + 2];
          const normalizedX = (x / folder3d.width) + .5;
          const normalizedY = (y / folder3d.height) + .5;
          const crossCurve = Math.sin(normalizedX * Math.PI);
          const hingeCurve = Math.sin(normalizedY * Math.PI);
          positionAttribute.setZ(index, z + crossCurve * hingeCurve * bendStrength);
        }

        positionAttribute.needsUpdate = true;
        panel.mesh.geometry.computeVertexNormals();
      }

      function animate() {
        progress += (targetOpen - progress) * 0.075;
        if (Math.abs(targetOpen - progress) < .001) progress = targetOpen;

        const lift = Math.sin(progress * Math.PI) * .7;
        topGroup.rotation.x = THREE.MathUtils.lerp(THREE.MathUtils.degToRad(-82), 0, progress);
        bottomGroup.rotation.x = THREE.MathUtils.lerp(THREE.MathUtils.degToRad(76), 0, progress);
        topGroup.position.z = lift;
        bottomGroup.position.z = lift * .72;
        bendPanel(topPanel, progress, 1);
        bendPanel(bottomPanel, progress, -1);
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      window.addEventListener("resize", resize);
      window.addEventListener("folder-open-start", () => { resize(); targetOpen = 0; progress = 0; });
      window.addEventListener("folder-unfold", () => { targetOpen = 1; });
      window.addEventListener("folder-close", () => { targetOpen = 0; });
      resize();
      window.__threeFolderReady = true;
      animate();
    } catch (error) {
      window.__threeFolderReady = "webgl-unavailable";
      canvas.hidden = true;
    }
  </script>
