<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diary Notebook UI (Preact + HTM)</title>
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 配置 Preact 和 HTM 的模块映射 -->
  <script type="importmap">
    {
      "imports": {
        "preact": "https://esm.sh/preact@10.19.2",
        "htm/preact": "https://esm.sh/htm@3.1.1/preact?external=preact"
      }
    }
  </script>
</head>
<body class="bg-[#1a1a1a]">
  
  <!-- 应用挂载点 -->
  <div id="app"></div>

  <!-- 核心逻辑 script -->
  <script type="module">
    import { render } from 'preact';
    import { html } from 'htm/preact';

    // --- 图标与装饰 SVG 组件 ---
    const SparkleStar = ({ class: className, color = "#FFB6C1" }) => html`
      <svg class=${className} viewBox="0 0 512 512" fill=${color} xmlns="http://www.w3.org/2000/svg">
        <path d="M256 0c0 141.4-114.6 256-256 256 141.4 0 256 114.6 256 256 0-141.4 114.6-256 256-256C370.6 256 256 141.4 256 0z" />
      </svg>
    `;

    // 普通爱心组件
    const Heart = ({ class: className, color = "#F4C2C2" }) => html`
      <svg class=${className} viewBox="0 0 24 24" fill=${color} xmlns="http://www.w3.org/2000/svg">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
      </svg>
    `;

    // 粉白格纹爱心组件
    const GinghamHeart = ({ class: className, color1 = "#f9b4c7", color2 = "#ffffff" }) => html`
      <svg class=${className} viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="gingham" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
            <rect x="0" y="0" width="4" height="4" fill=${color1} />
            <rect x="0" y="0" width="2" height="2" fill=${color2} opacity="0.4" />
            <rect x="2" y="2" width="2" height="2" fill=${color2} opacity="0.4" />
          </pattern>
        </defs>
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="url(#gingham)" />
      </svg>
    `;

    const Starfish = ({ class: className }) => html`
      <svg class=${className} viewBox="0 0 24 24" fill="#1E90FF" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L14.5 9H22L16 13.5L18 21L12 16.5L6 21L8 13.5L2 9H9.5L12 2Z" stroke="#00BFFF" stroke-width="1" stroke-linejoin="round"/>
      </svg>
    `;

    const PushPin = () => html`
      <div class="absolute -top-3 left-1/2 transform -translate-x-1/2 z-20 flex flex-col items-center drop-shadow-md">
        <div class="w-3.5 h-3.5 rounded-full bg-gradient-to-br from-gray-200 to-gray-400 shadow-[inset_1px_1px_2px_rgba(255,255,255,0.8),_0_2px_4px_rgba(0,0,0,0.4)] border border-gray-400/50"></div>
        <div class="w-[1.5px] h-4 bg-gradient-to-b from-gray-400 to-gray-500 -mt-1 shadow-sm"></div>
      </div>
    `;

    // --- 顶部导航图标 ---
    const Icons = {
      Home: () => html`<svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z" /></svg>`,
      Cloud: () => html`<svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M5.5 16a3.5 3.5 0 01-.369-6.98 4 4 0 117.753-1.977A4.5 4.5 0 1113.5 16h-8z" /></svg>`,
      Clover: () => html`<svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2c-1.1 0-2 .9-2 2 0 1.94-1.84 3.09-3.4 2.19C5.45 5.51 4 6.55 4 8c0 1.1.9 2 2 2 1.94 0 3.09 1.84 2.19 3.4-.68 1.15.36 2.6 1.81 2.6 1.1 0 2-.9 2-2 0-1.94 1.84-3.09 3.4-2.19 1.15.68 2.6-.36 2.6-1.81 0-1.1-.9-2-2-2-1.94 0-3.09-1.84-2.19-3.4.68-1.15-.36-2.6-1.81-2.6-1.1 0-2 .9-2 2z" /></svg>`,
      Book: () => html`<svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 14c1.669 0 3.218.51 4.5 1.385A7.962 7.962 0 0114.5 14c1.255 0 2.443.29 3.5.804v-10A7.968 7.968 0 0014.5 4c-1.255 0-2.443.29-3.5.804V12a1 1 0 11-2 0V4.804z" /></svg>`,
      Heart: () => html`<svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd" /></svg>`,
      Folder: () => html`<svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" /></svg>`
    };

    // --- 右侧日记文本行组件 ---
    const DiaryLine = ({ children, isHeader = false }) => html`
      <div class="border-b border-white/20 pb-[2px] mb-[4px] ${isHeader ? 'mt-6' : ''}">
        <span class="text-[1.1rem] leading-snug tracking-wide">${children}</span>
      </div>
    `;

    // --- 主应用组件 ---
    const App = () => {
      const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
      const tabs = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP'];

      return html`
        <style>
          @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap');
          
          .font-handwriting { font-family: 'Caveat', cursive; }
          .font-serif-elegant { font-family: 'Playfair Display', serif; }
          .font-sans-ui { font-family: 'Inter', sans-serif; }
          
          /* 增加日记本背景的轻微纸张颗粒感 */
          .texture-bg {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
          }
        </style>

        <div class="min-h-screen bg-[#1a1a1a] flex items-center justify-center p-4 md:p-12 font-sans-ui select-none overflow-hidden">
          
          <!-- 日记本外壳容器 -->
          <div class="w-full max-w-7xl aspect-[2/1.3] bg-[#345b82] rounded-md shadow-[0_25px_50px_-12px_rgba(0,0,0,0.6),_0_0_15px_rgba(0,0,0,0.4)] flex relative overflow-visible texture-bg ring-1 ring-white/10">
            
            <!-- 中间装订线与阴影 (书脊) -->
            <div class="absolute left-1/2 top-0 bottom-0 w-16 -ml-8 bg-gradient-to-r from-transparent via-black/40 to-transparent z-30 pointer-events-none mix-blend-multiply"></div>
            <div class="absolute left-1/2 top-0 bottom-0 w-[2px] bg-[#1c3552] z-30 shadow-[0_0_5px_rgba(0,0,0,0.5)]"></div>
            <div class="absolute left-1/2 top-0 bottom-0 w-[1px] bg-white/10 ml-[2px] z-30"></div>

            <!-- ================= 左侧页面 ================= -->
            <div class="w-1/2 h-full relative border-r border-[#1c3552]">
              
              <!-- 顶部导航 -->
              <div class="absolute top-6 left-7 flex space-x-4 items-center text-[8.5px] text-[#e2e8f0]/80 tracking-[0.2em] font-semibold">
                <div class="flex items-center space-x-1 hover:text-white cursor-pointer"><${Icons.Home} /></div>
                <div class="flex items-center space-x-1 hover:text-white cursor-pointer"><${Icons.Cloud} /> <span>PROJECT</span></div>
                <div class="flex items-center space-x-1 hover:text-white cursor-pointer"><${Icons.Clover} /> <span>TRACKER</span></div>
                <div class="flex items-center space-x-1 hover:text-white cursor-pointer"><${Icons.Book} /> <span>EXPENSE</span></div>
                <div class="flex items-center space-x-1 hover:text-white cursor-pointer"><${Icons.Heart} /> <span>REFLECT</span></div>
                <div class="flex items-center space-x-1 hover:text-white cursor-pointer text-[#e2e8f0]"><${Icons.Folder} /> <span class="font-bold">JOURNAL</span></div>
              </div>

              <!-- 左侧月份侧边栏 -->
              <div class="absolute left-6 top-32 flex flex-col space-y-[1.1rem] text-[13px] font-serif-elegant">
                ${months.map((month, index) => html`
                  <div key=${month} class="flex items-center cursor-pointer transition-colors ${index === 0 ? 'text-[#e2e8f0]' : 'text-[#e2e8f0]/50 hover:text-[#e2e8f0]/80'}">
                    ${index === 0 ? html`<span class="mr-2 text-white text-[10px]">✦</span>` : ''}
                    ${month}
                  </div>
                `)}
              </div>

              <!-- === 拼贴画区域 === -->
              <div class="absolute top-[48%] left-[60%] transform -translate-x-1/2 -translate-y-1/2 w-[320px] h-[400px]">
                
                <!-- 底层贴纸：粉色边框阿拉伯书法 (使用相近视觉素材) -->
                <div class="absolute top-6 left-12 w-[160px] h-[160px] bg-[#fdf2f2] p-2 shadow-lg transform -rotate-2 z-0 border-[6px] border-[#f4c8c8]/40">
                  <div class="w-full h-full border border-[#e0b0b0] bg-[url('https://images.unsplash.com/photo-1579546929518-9e396f3cc809?auto=format&fit=crop&w=300&q=80')] bg-cover bg-center opacity-70 mix-blend-multiply flex items-center justify-center">
                    <!-- 模拟中间的文字 -->
                    <div class="font-serif-elegant text-[#8b4513] text-center px-2 bg-white/60 p-1 rounded backdrop-blur-sm">
                      <p class="text-xs font-bold">فَإِنَّ مَعَ الْعُسْرِ</p>
                      <p class="text-sm">يُسْرًا</p>
                    </div>
                  </div>
                  <!-- 蓝色海星贴纸 - 贴在粉色卡片左上角 -->
                  <${Starfish} class="absolute -top-4 -left-2 w-8 h-8 drop-shadow-md transform -rotate-12 z-40" />
                </div>

                <!-- 中层贴纸：复古地图/建筑 (下方的大图) -->
                <div class="absolute top-24 left-2 w-[220px] h-[280px] bg-[#fbf5e6] p-2 shadow-xl transform rotate-1 z-10">
                  <img src="https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&w=400&q=80" alt="Vintage Map" class="w-full h-full object-cover border border-[#d2c4a7]" />
                  <!-- 模拟图上的克尔白元素 -->
                  <div class="absolute bottom-12 left-1/2 transform -translate-x-1/2 w-12 h-16 bg-black/80 flex items-center justify-center border-t-2 border-yellow-500 shadow-md">
                     <div class="w-full h-[2px] bg-yellow-500 absolute top-3"></div>
                     <span class="text-yellow-500 text-[10px] font-serif-elegant">الله</span>
                  </div>
                </div>

                <!-- 顶层拍立得：黑色背景与金色阿拉伯字 -->
                <div class="absolute top-[35%] left-[25%] w-[210px] h-[230px] bg-[#fcfcfc] p-2 pb-8 shadow-[0_10px_25px_rgba(0,0,0,0.3)] transform rotate-3 z-20 transition-transform hover:scale-105 duration-300">
                  <${PushPin} />
                  <div class="w-full h-full bg-[#1a1a1a] flex flex-col items-center justify-center relative overflow-hidden">
                    <!-- 模拟背景暗纹 -->
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-60"></div>
                    <!-- 阿拉伯文字模拟 -->
                    <div class="text-[#dcb163] font-serif-elegant text-center leading-tight drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)] z-10 flex flex-col items-center">
                       <span class="text-5xl font-bold mb-1">الواقع</span>
                       <span class="text-6xl font-bold">المتخيل</span>
                    </div>
                    <!-- 底部小字装饰 -->
                    <div class="absolute bottom-2 left-0 right-0 text-center text-white/40 text-[5px] tracking-widest uppercase">
                      Retba Brush Arabic Font
                    </div>
                  </div>
                </div>

              </div>

              <!-- 装饰物：闪亮星星 -->
              <${SparkleStar} class="absolute top-24 left-24 w-8 h-8 opacity-90 z-30" color="#fbcfe8" />
              <${SparkleStar} class="absolute top-32 right-16 w-12 h-12 opacity-80 z-30" color="#fbcfe8" />
              <${SparkleStar} class="absolute bottom-20 left-24 w-10 h-10 opacity-90 z-30" color="#fbcfe8" />
              <${SparkleStar} class="absolute bottom-12 right-24 w-6 h-6 opacity-60 z-30" color="#fbcfe8" />
              
              <!-- 装饰物：爱心 -->
              <${GinghamHeart} class="absolute top-40 right-20 w-16 h-16 transform -rotate-12 opacity-90 drop-shadow-md z-30" />
              <${Heart} class="absolute top-60 right-12 w-12 h-12 transform rotate-12 opacity-90 drop-shadow-md z-30" color="#f9b4c7" />

              <!-- 左下角版权文字 -->
              <div class="absolute bottom-4 left-1/2 transform -translate-x-1/2 text-[10px] text-[#e2e8f0]/40 font-serif-elegant">
                © The Butter and Scotch
              </div>

            </div>

            <!-- ================= 右侧页面 ================= -->
            <div class="w-1/2 h-full relative bg-[#345b82] rounded-r-md">
              
              <!-- 顶部月份标签 (Tabs) -->
              <div class="absolute -top-[22px] left-2 flex z-0 space-x-[2px]">
                ${tabs.map((tab, index) => html`
                  <div key=${tab} class="px-3 py-[4px] text-[9px] font-bold rounded-t-lg cursor-pointer shadow-sm relative ${index === 0 ? 'bg-[#f4f4f4] text-[#333] z-10 h-[26px] -mt-[4px]' : 'bg-[#d1d5db] text-[#6b7280] hover:bg-[#e5e7eb] z-0 h-[22px]'}">
                    ${tab}
                  </div>
                `)}
              </div>

              <!-- 装饰物：右侧的星星 -->
              <${SparkleStar} class="absolute top-16 left-32 w-8 h-8 opacity-70 z-30" color="#fbcfe8" />
              <${SparkleStar} class="absolute top-24 right-32 w-14 h-14 opacity-90 z-30" color="#fbcfe8" />
              <${SparkleStar} class="absolute bottom-32 left-1/2 w-12 h-12 opacity-80 z-30" color="#fbcfe8" />
              <${SparkleStar} class="absolute bottom-20 right-20 w-6 h-6 opacity-60 z-30" color="#fbcfe8" />
              <div class="absolute bottom-16 left-32 w-2 h-2 bg-[#fbcfe8] rounded-full opacity-70 shadow-[0_0_8px_#fbcfe8] z-30"></div>

              <!-- 日记文本内容区域 -->
              <div class="absolute inset-0 p-10 pl-14 pt-14 font-handwriting text-[#f4f7f6] z-10 flex flex-col">
                
                <!-- 第一段 -->
                <div class="mb-4">
                  <${DiaryLine}>Hello, myself. How was your month?<//>
                  <${DiaryLine}>My first umrah—just wow. it was absolutely magical,<//>
                  <${DiaryLine}>like i was really living it, fully there in the moment. it<//>
                  <${DiaryLine}>challenged me a lot, but honestly, i'd do it all over<//>
                  <${DiaryLine}>again. Everyone should experience this at least once!<//>
                </div>

                <!-- 第二段 -->
                <div class="mb-4">
                  <${DiaryLine} isHeader=${true}>Things to quit<//>
                  <${DiaryLine}>As for things i should stop doing—same old story<//>
                  <${DiaryLine}>—i need to stop overplanning everything and<//>
                  <${DiaryLine}>just let things happen naturally. that would be<//>
                  <${DiaryLine}>nice.<//>
                </div>

                <!-- 第三段 -->
                <div>
                  <${DiaryLine} isHeader=${true}>Things to be proud of<//>
                  <${DiaryLine}>—i'm proud of having a strong personality, of being<//>
                  <${DiaryLine}>there for people. People say i'm unique, that i help<//>
                  <${DiaryLine}>them, that i'm capable of a lot. And i want to keep<//>
                  <${DiaryLine}>being proud of that moving forward.<//>
                </div>

              </div>

            </div>

          </div>
        </div>
      `;
    };

    // 渲染应用
    render(html`<${App} />`, document.getElementById('app'));
  </script>
</body>
</html>
