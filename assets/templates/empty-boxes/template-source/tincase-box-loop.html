      :root {
        color-scheme: light;
        --ink: #27251f;
        --paper: #fbf7ee;
        --mint: #b6efcf;
        --blue: #9bcaff;
        --pink: #ff92ad;
        --yellow: #f4ff72;
        --lilac: #d3bcff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background:
          repeating-linear-gradient(90deg, rgba(77, 213, 233, 0.42) 0 18px, transparent 18px 66px),
          repeating-linear-gradient(90deg, rgba(35, 199, 145, 0.27) 0 4px, transparent 4px 66px),
          repeating-linear-gradient(0deg, rgba(255, 230, 142, 0.62) 0 28px, transparent 28px 96px),
          var(--paper);
        font-family:
          ui-rounded,
          "SF Pro Rounded",
          "Arial Rounded MT Bold",
          system-ui,
          sans-serif;
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        content: "";
        background:
          radial-gradient(circle at 50% 50%, rgba(45, 42, 34, 0.18) 0 2px, transparent 2.4px) 0 0 / 58px 58px,
          radial-gradient(circle at 50% 50%, rgba(45, 42, 34, 0.12) 0 1.7px, transparent 2.2px) 29px 29px / 58px 58px;
        mix-blend-mode: multiply;
      }

      body::after {
        position: fixed;
        inset: 0;
        z-index: 20;
        pointer-events: none;
        content: "";
        background:
          linear-gradient(to bottom, rgba(255, 255, 255, 0.28), transparent 18%, transparent 78%, rgba(255, 245, 214, 0.5)),
          radial-gradient(circle at 50% 48%, transparent 0 44%, rgba(255, 248, 226, 0.35) 76%, rgba(42, 37, 31, 0.11) 100%);

      #app,
      #p5-layer,
      #three-stage {
        position: fixed;
        inset: 0;
      }

      #app {
        z-index: 1;
        pointer-events: none;
      }

      #p5-layer {
        z-index: 2;
        pointer-events: none;
      }

      #p5-layer canvas {
        display: block;
      }

      #three-stage {
        z-index: 10;
        cursor: grab;
        touch-action: none;
      }

      #three-stage:active {
        cursor: grabbing;
      }

      #three-stage canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .sticker-field {
        position: fixed;
        inset: -9vh -9vw;
        overflow: hidden;
      }

      .gem-tile {
        position: absolute;
        left: var(--x);
        top: var(--y);
        width: var(--size);
        opacity: var(--alpha);
        transform: translate(-50%, -50%);
        animation: gem-breathe var(--duration) ease-in-out infinite alternate;
        animation-delay: var(--delay);
        filter: drop-shadow(0 8px 9px rgba(41, 37, 31, 0.1));
        will-change: translate;
      }

      .gem-tile img {
        display: block;
        width: 100%;
        height: auto;
        transform: rotate(var(--rot)) scale(var(--scale));
        transform-origin: 50% 55%;
        animation: gem-spark var(--spark-duration) ease-in-out infinite;
        animation-delay: var(--spark-delay);
        filter: brightness(1) saturate(1);
        will-change: transform, opacity, filter;
        user-select: none;
        -webkit-user-drag: none;
      }

      @keyframes gem-breathe {
        0% {
          translate: 0 0;
        }
        100% {
          translate: var(--dx) var(--dy);
        }
      }

      @keyframes gem-spark {
        0%,
        100% {
          opacity: 0.62;
          filter: brightness(0.92) saturate(0.96);
          transform: rotate(var(--rot)) scale(calc(var(--scale) * 0.82));
        }
        38% {
          opacity: 0.92;
          filter: brightness(1.1) saturate(1.18);
          transform: rotate(var(--rot)) scale(calc(var(--scale) * 1.08));
        }
        58% {
          opacity: 1;
          filter: brightness(1.28) saturate(1.35);
          transform: rotate(var(--rot)) scale(calc(var(--scale) * 1.22));
        }
        78% {
          opacity: 0.76;
          filter: brightness(1.02) saturate(1.08);
          transform: rotate(var(--rot)) scale(calc(var(--scale) * 0.95));
        }
      }

      .label-layer {
        position: fixed;
        inset: 0;
        z-index: 4;
      }

      .hand-label {
        position: absolute;
        z-index: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        isolation: isolate;
        min-width: var(--block-w);
        min-height: var(--block-h);
        padding: var(--block-pad-y) var(--block-pad-x);
        color: rgba(255, 255, 255, 0.46);
        line-height: 0.88;
        letter-spacing: 0;
        white-space: nowrap;
        -webkit-text-stroke: clamp(1px, 0.18vw, 2.8px) var(--stroke);
        text-shadow:
          1px 1px 0 rgba(255, 255, 255, 0.72),
          0 8px 18px rgba(43, 38, 32, 0.12);
        transform: rotate(var(--tilt));
      }

      .hand-label::before {
        position: absolute;
        inset: 0;
        z-index: -1;
        content: "";
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: var(--block-radius);
        background: var(--block-bg);
        box-shadow: 0 16px 34px rgba(51, 43, 35, 0.08);

        border-radius: 50%;

        from {

        to {

        top: clamp(14px, 3vw, 34px);

        display: inline-flex;

          top: 46vh;

        .label-memory {
          right: 2.5vw;
          bottom: 23vh;
          white-space: nowrap;
          max-width: none;
          text-align: right;
        }

                p.rect(-w / 2, -h / 2, w, h, Math.min(14, h * 0.5));
                p.pop();
              }
              p.drawingContext.globalCompositeOperation = "source-over";
            };

            p.windowResized = () => {
              p.resizeCanvas(window.innerWidth, window.innerHeight);
            };
          });
        }

        if (!window.THREE) {
          document.body.classList.add("no-three");
          return;
        }

        const stage = document.getElementById("three-stage");
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setClearColor(0xffffff, 0);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        stage.appendChild(renderer.domElement);

        const group = new THREE.Group();
        scene.add(group);

        const loopGeometry = new THREE.BufferGeometry();
        const loopPoints = [];
        for (let i = 0; i <= 180; i += 1) {
          const angle = (i / 180) * Math.PI * 2;
          loopPoints.push(new THREE.Vector3(Math.sin(angle * 2) * 0.18, Math.sin(angle) * 4.1, Math.cos(angle) * 2.35 - 0.22));
        }
        loopGeometry.setFromPoints(loopPoints);
        const loopLine = new THREE.Line(
          loopGeometry,
          new THREE.LineBasicMaterial({ color: 0x2c2822, transparent: true, opacity: 0.12 }),
        );
        loopLine.renderOrder = 1;
        scene.add(loopLine);

        const loadImage = (src) =>
          new Promise((resolve, reject) => {
            const image = new Image();
            image.decoding = "async";
            image.onload = () => resolve(image);
            image.onerror = () => reject(new Error(`Failed to load ${src}`));
            image.src = src;
          });

        function makeCanvas(width, height) {
          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;
          return canvas;
        }

        let collageFontsPromise = null;
        function loadCollageFonts() {
          if (collageFontsPromise) return collageFontsPromise;
          if (!window.FontFace || !document.fonts) {
            collageFontsPromise = Promise.resolve();
            return collageFontsPromise;
          }
          const faces = [
            new FontFace("WanWeiHand", "url('fonts/我爱万伟伟手写体.ttf')"),
            new FontFace("FushengKai", "url('fonts/张穸洛浮生楷体.ttf')"),
          ];
          collageFontsPromise = Promise.all(faces.map((face) => face.load()))
            .then((loadedFaces) => {
              loadedFaces.forEach((face) => document.fonts.add(face));
              return document.fonts.ready;
            })
            .catch(() => undefined);
          return collageFontsPromise;
        }

        function roundedRectPath(ctx, x, y, width, height, radius) {
          const r = Math.min(radius, width / 2, height / 2);
          ctx.beginPath();
          ctx.moveTo(x + r, y);
          ctx.arcTo(x + width, y, x + width, y + height, r);
          ctx.arcTo(x + width, y + height, x, y + height, r);
          ctx.arcTo(x, y + height, x, y, r);
          ctx.arcTo(x, y, x + width, y, r);
          ctx.closePath();
        }

        function drawRotated(ctx, cx, cy, angle, draw) {
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate((angle * Math.PI) / 180);
          draw(ctx);
          ctx.restore();
        }

        function drawImageCover(ctx, image, x, y, width, height, cropX = 0.5, cropY = 0.5) {
          const imgW = image.naturalWidth || image.width;
          const imgH = image.naturalHeight || image.height;
          const scale = Math.max(width / imgW, height / imgH);
          const sw = width / scale;
          const sh = height / scale;
          const sx = clamp((imgW - sw) * cropX, 0, Math.max(0, imgW - sw));
          const sy = clamp((imgH - sh) * cropY, 0, Math.max(0, imgH - sh));
          ctx.drawImage(image, sx, sy, sw, sh, x, y, width, height);
        }

        function drawSoftShadow(ctx, color = "rgba(32, 27, 22, 0.28)", blur = 26, ox = 12, oy = 18) {
          ctx.shadowColor = color;
          ctx.shadowBlur = blur;
          ctx.shadowOffsetX = ox;
          ctx.shadowOffsetY = oy;
        }

        function drawTape(ctx, x, y, width, height, color = "rgba(172, 216, 246, 0.58)") {
          ctx.save();
          ctx.globalAlpha = 0.95;
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.moveTo(x + 8, y);
          ctx.lineTo(x + width - 8, y + 3);
          ctx.lineTo(x + width, y + height - 4);
          ctx.lineTo(x + 7, y + height);
          ctx.closePath();
          ctx.fill();
          ctx.globalAlpha = 0.22;
          ctx.fillStyle = "#fff9d8";
          for (let i = 0; i < 5; i += 1) {
            ctx.fillRect(x + 8 + i * (width / 5), y + 4, 3, height - 8);
          }
          ctx.restore();
        }

        function drawTapePiece(ctx, cx, cy, width, height, angle, color) {
          drawRotated(ctx, cx, cy, angle, () => {
            drawTape(ctx, -width / 2, -height / 2, width, height, color);
          });
        }

        function drawSticker(ctx, image, cx, cy, width, angle = 0, shadow = true) {
          const imgW = image.naturalWidth || image.width;
          const imgH = image.naturalHeight || image.height;
          const height = width * (imgH / imgW);
          drawRotated(ctx, cx, cy, angle, () => {
            ctx.save();
            if (shadow) drawSoftShadow(ctx, "rgba(31, 28, 23, 0.2)", 18, 8, 12);
            ctx.drawImage(image, -width / 2, -height / 2, width, height);
            ctx.restore();
          });
        }

        function drawPaper(ctx, cx, cy, width, height, angle, fill, stroke = "rgba(79, 67, 47, 0.22)") {
          drawRotated(ctx, cx, cy, angle, () => {
            ctx.save();
            drawSoftShadow(ctx, "rgba(35, 30, 24, 0.23)", 24, 10, 14);
            roundedRectPath(ctx, -width / 2, -height / 2, width, height, 18);
            ctx.fillStyle = fill;
            ctx.fill();
            ctx.shadowColor = "transparent";
            ctx.lineWidth = 2;
            ctx.strokeStyle = stroke;
            ctx.stroke();
            ctx.restore();
          });
        }

        function drawReceipt(ctx, cx, cy, width, height, angle, title) {
          drawRotated(ctx, cx, cy, angle, () => {
            ctx.save();
            drawSoftShadow(ctx, "rgba(32, 28, 22, 0.22)", 22, 9, 16);
            ctx.fillStyle = "rgba(253, 251, 244, 0.96)";
            ctx.fillRect(-width / 2, -height / 2, width, height);
            ctx.shadowColor = "transparent";
            ctx.fillStyle = "rgba(46, 45, 41, 0.78)";
            ctx.font = '700 24px "Courier New", monospace';
            ctx.fillText(title, -width / 2 + 18, -height / 2 + 38);
            ctx.font = '15px "Courier New", monospace';
            for (let i = 0; i < 11; i += 1) {
              const y = -height / 2 + 70 + i * 21;
              ctx.globalAlpha = i % 3 === 0 ? 0.92 : 0.58;
              ctx.fillText(i % 2 ? "sea bus    05.20" : "ticket     coast", -width / 2 + 18, y);
            }
            ctx.globalAlpha = 1;
            ctx.fillStyle = "rgba(20, 20, 18, 0.68)";
            for (let i = 0; i < 18; i += 1) {
              ctx.fillRect(-width / 2 + 20 + i * 6, height / 2 - 34, i % 3 === 0 ? 4 : 2, 22);
            }
            ctx.restore();
          });
        }

        function drawLabel(ctx, text, cx, cy, width, height, angle, fill, color = "#273238") {
          drawRotated(ctx, cx, cy, angle, () => {
            ctx.save();
            drawSoftShadow(ctx, "rgba(39, 32, 26, 0.14)", 14, 6, 8);
            roundedRectPath(ctx, -width / 2, -height / 2, width, height, 8);
            ctx.fillStyle = fill;
            ctx.fill();
            ctx.shadowColor = "transparent";
            ctx.fillStyle = color;
            ctx.font = `800 ${Math.round(height * 0.48)}px Arial, sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(text, 0, 1);
            ctx.restore();
          });
        }

        function drawMiniCircle(ctx, text, cx, cy, radius, angle, fill = "#fff8c6", color = "#34332d") {
          drawRotated(ctx, cx, cy, angle, () => {
            ctx.save();
            drawSoftShadow(ctx, "rgba(35, 30, 24, 0.16)", 10, 4, 7);
            ctx.beginPath();
            ctx.arc(0, 0, radius, 0, Math.PI * 2);
            ctx.fillStyle = fill;
            ctx.fill();
            ctx.shadowColor = "transparent";
            ctx.lineWidth = 2;
            ctx.strokeStyle = "rgba(68, 58, 44, 0.25)";
            ctx.stroke();
            ctx.fillStyle = color;
            ctx.font = `800 ${Math.round(radius * 1.05)}px Arial, sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(text, 0, 1);
            ctx.restore();
          });
        }

        function drawLetterBeads(ctx, text, x, y, angle, radius = 21) {
          drawRotated(ctx, x, y, angle, () => {
            [...text].forEach((letter, i) => {
              const dx = i * radius * 1.72;
              const dy = Math.sin(i * 0.9) * 8;
              drawMiniCircle(ctx, letter, dx, dy, radius, -angle, i % 2 ? "#eef7ff" : "#fff6b5", "#313437");
            });
          });
        }

        function drawFramedPhoto(ctx, photo, frame, cx, cy, frameWidth, angle, windowRect, caption) {
          const fw = frameWidth;
          const fh = fw * ((frame.naturalHeight || frame.height) / (frame.naturalWidth || frame.width));
          const sx = fw / (frame.naturalWidth || frame.width);
          const sy = fh / (frame.naturalHeight || frame.height);
          const wx = -fw / 2 + windowRect.x * sx;
          const wy = -fh / 2 + windowRect.y * sy;
          const ww = windowRect.w * sx;
          const wh = windowRect.h * sy;

          drawRotated(ctx, cx, cy, angle, () => {
            ctx.save();
            drawSoftShadow(ctx, "rgba(25, 20, 16, 0.24)", 22, 10, 16);
            ctx.fillStyle = "#fffdf5";
            roundedRectPath(ctx, wx - 8, wy - 8, ww + 16, wh + 16, 18);
            ctx.fill();
            ctx.shadowColor = "transparent";
            ctx.save();
            roundedRectPath(ctx, wx, wy, ww, wh, 12);
            ctx.clip();
            drawImageCover(ctx, photo, wx, wy, ww, wh, 0.5, 0.42);
            ctx.restore();
            ctx.drawImage(frame, -fw / 2, -fh / 2, fw, fh);
            if (caption) {
              ctx.fillStyle = "#314c53";
              ctx.font = '24px WanWeiHand, "Hannotate SC", "Kaiti SC", cursive';
              ctx.fillText(caption, wx + 8, wy + wh + 30);
            }
            ctx.restore();
          });
        }

        function drawFilmPhoto(ctx, image, cx, cy, width, height, angle, caption) {
          drawRotated(ctx, cx, cy, angle, () => {
            const stripH = height + 92;
            ctx.save();
            drawSoftShadow(ctx, "rgba(18, 15, 12, 0.32)", 28, 14, 20);
            roundedRectPath(ctx, -width / 2 - 22, -stripH / 2, width + 44, stripH, 10);
            ctx.fillStyle = "#1f211f";
            ctx.fill();
            ctx.shadowColor = "transparent";
            ctx.fillStyle = "#f7f3e7";
            for (let i = 0; i < 12; i += 1) {
              const x = -width / 2 + i * (width / 11) - 5;
              ctx.fillRect(x, -stripH / 2 + 12, 12, 22);
              ctx.fillRect(x, stripH / 2 - 34, 12, 22);
            }
            ctx.fillStyle = "#fffaf0";
            ctx.fillRect(-width / 2 + 20, -height / 2 - 8, width - 40, height + 16);
            drawImageCover(ctx, image, -width / 2 + 32, -height / 2 + 4, width - 64, height - 8, 0.5, 0.48);
            ctx.fillStyle = "#f9f1de";
            ctx.fillRect(-width / 2 + 20, height / 2 + 8, width - 40, 38);
            ctx.fillStyle = "#3f4b4d";
            ctx.font = '31px WanWeiHand, "Bradley Hand", "Comic Sans MS", cursive';
            ctx.fillText(caption, -width / 2 + 45, height / 2 + 36);
            ctx.restore();
          });
        }

        function drawPolaroid(ctx, image, cx, cy, width, height, angle, caption) {
          const border = 24;
          const bottom = 66;
          const cardW = width + border * 2;
          const cardH = height + border + bottom;
          drawRotated(ctx, cx, cy, angle, () => {
            ctx.save();
            drawSoftShadow(ctx, "rgba(26, 22, 17, 0.26)", 25, 12, 18);
            ctx.fillStyle = "#fffaf0";
            ctx.fillRect(-cardW / 2, -cardH / 2, cardW, cardH);
            ctx.shadowColor = "transparent";
            ctx.strokeStyle = "rgba(187, 176, 155, 0.5)";
            ctx.lineWidth = 2;
            ctx.strokeRect(-cardW / 2, -cardH / 2, cardW, cardH);
            drawImageCover(ctx, image, -width / 2, -cardH / 2 + border, width, height, 0.5, 0.35);
            ctx.fillStyle = "#374244";
            ctx.font = '30px WanWeiHand, "Bradley Hand", "Comic Sans MS", cursive';
            ctx.fillText(caption, -width / 2 + 12, cardH / 2 - 23);
            ctx.restore();
          });
        }

        function drawOutlinedPhoto(ctx, image, cx, cy, width, height, angle, caption) {
          drawRotated(ctx, cx, cy, angle, () => {
            ctx.save();
            drawSoftShadow(ctx, "rgba(28, 23, 17, 0.22)", 22, 10, 16);
            roundedRectPath(ctx, -width / 2 - 18, -height / 2 - 18, width + 36, height + 36, 42);
            ctx.fillStyle = "#fffdf5";
            ctx.fill();
            ctx.shadowColor = "transparent";
            roundedRectPath(ctx, -width / 2, -height / 2, width, height, 32);
            ctx.clip();
            drawImageCover(ctx, image, -width / 2, -height / 2, width, height, 0.48, 0.38);
            ctx.restore();
            ctx.save();
            roundedRectPath(ctx, -width / 2 - 18, -height / 2 - 18, width + 36, height + 36, 42);
            ctx.strokeStyle = "#fffdf5";
            ctx.lineWidth = 18;
            ctx.stroke();
            roundedRectPath(ctx, -width / 2 - 5, -height / 2 - 5, width + 10, height + 10, 35);
            ctx.strokeStyle = "rgba(89, 122, 157, 0.55)";
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.fillStyle = "#2c454e";
            ctx.font = '28px "Bradley Hand", "Comic Sans MS", cursive';
            ctx.fillText(caption, -width / 2 + 6, height / 2 + 45);
            ctx.restore();
          });
        }

        function drawCutoutPhoto(ctx, image, cx, cy, width, angle, caption, captionOffsetY = 0) {
          const imgW = image.naturalWidth || image.width;
          const imgH = image.naturalHeight || image.height;
          const height = width * (imgH / imgW);
          const pad = 28;
          const scaled = makeCanvas(width + pad * 2, height + pad * 2);
          const sctx = scaled.getContext("2d");
          sctx.drawImage(image, pad, pad, width, height);

          const tint = makeCanvas(scaled.width, scaled.height);
          const tctx = tint.getContext("2d");
          tctx.drawImage(scaled, 0, 0);
          tctx.globalCompositeOperation = "source-in";
          tctx.fillStyle = "#fffdf5";
          tctx.fillRect(0, 0, tint.width, tint.height);

          drawRotated(ctx, cx, cy, angle, () => {
            ctx.save();
            drawSoftShadow(ctx, "rgba(25, 20, 16, 0.26)", 24, 12, 17);
            ctx.drawImage(tint, -tint.width / 2, -tint.height / 2);
            ctx.shadowColor = "transparent";
            for (let i = 0; i < 18; i += 1) {
              const a = (i / 18) * Math.PI * 2;
              ctx.drawImage(tint, -tint.width / 2 + Math.cos(a) * 8, -tint.height / 2 + Math.sin(a) * 8);
            }
            ctx.drawImage(scaled, -scaled.width / 2, -scaled.height / 2);
            ctx.fillStyle = "#284550";
            ctx.font = '28px WanWeiHand, "Hannotate SC", "Kaiti SC", cursive';
            ctx.fillText(caption, -width / 2 + 8, height / 2 + 42 + captionOffsetY);
            ctx.restore();
          });
        }

        function drawChineseNote(ctx, cx, cy, angle, scale = 1, note = {}) {
          const title = note.title || "for you";
          const lines = note.lines || ["在镰仓七里滨下车后，", "你把我的汽水接过去，", "替我拧开，又装作若无其事。", "海风把车票吹皱了，", "我却只记得你低头笑的样子。"];
          const sign = note.sign || "520快乐，今天也想和你去海边。";
          const marketTheme = note.theme === "market";
          const fridgeTheme = note.theme === "fridge";
          drawRotated(ctx, cx, cy, angle, () => {
            ctx.scale(scale, scale);
            const width = 485;
            const height = 338;
            ctx.save();
            drawSoftShadow(ctx, "rgba(28, 23, 18, 0.25)", 26, 12, 18);
            roundedRectPath(ctx, -width / 2, -height / 2, width, height, 20);
            ctx.fillStyle = fridgeTheme ? "rgba(230, 248, 255, 0.98)" : marketTheme ? "rgba(255, 244, 198, 0.98)" : "rgba(255, 249, 213, 0.97)";
            ctx.fill();
            ctx.shadowColor = "transparent";
            ctx.strokeStyle = fridgeTheme ? "rgba(82, 148, 180, 0.5)" : marketTheme ? "rgba(224, 118, 92, 0.48)" : "rgba(181, 142, 70, 0.64)";
            ctx.lineWidth = 3;
            ctx.stroke();
            if (marketTheme || fridgeTheme) {
              ctx.fillStyle = fridgeTheme ? "rgba(123, 203, 226, 0.16)" : "rgba(255, 160, 148, 0.18)";
              for (let y = -height / 2 + 18; y < height / 2; y += 34) {
                ctx.fillRect(-width / 2 + 16, y, width - 32, 15);
              }
              ctx.strokeStyle = fridgeTheme ? "rgba(83, 146, 182, 0.2)" : "rgba(74, 147, 130, 0.24)";
              ctx.lineWidth = 1.6;
              for (let x = -width / 2 + 36; x < width / 2 - 24; x += 34) {
                ctx.beginPath();
                ctx.moveTo(x, -height / 2 + 16);
                ctx.lineTo(x, height / 2 - 16);
                ctx.stroke();
              }
            } else {
              ctx.fillStyle = "rgba(248, 205, 220, 0.5)";
              ctx.fillRect(-width / 2 + 30, -height / 2, 42, height);
              ctx.strokeStyle = "rgba(70, 133, 143, 0.34)";
              ctx.lineWidth = 2;
              for (let y = -height / 2 + 74; y < height / 2 - 24; y += 33) {
                ctx.beginPath();
                ctx.moveTo(-width / 2 + 52, y);
                ctx.lineTo(width / 2 - 38, y);
                ctx.stroke();
              }
            }
            ctx.fillStyle = fridgeTheme ? "#4b78a0" : marketTheme ? "#d24f59" : "#5f7ca2";
            ctx.font = marketTheme ? '58px "Marker Felt", "Apple Chancery", cursive' : '60px "Apple Chancery", "Snell Roundhand", cursive';
            ctx.fillText(title, -width / 2 + 82, -height / 2 + 70);
            ctx.fillStyle = fridgeTheme ? "#415c66" : marketTheme ? "#4d5140" : "#546159";
            ctx.font = '27px WanWeiHand, "Hannotate SC", "Kaiti SC", "PingFang SC", serif';
            lines.forEach((line, i) => ctx.fillText(line, -width / 2 + 82, -height / 2 + 116 + i * 33));
            ctx.fillStyle = fridgeTheme ? "#3b8193" : marketTheme ? "#2f7d72" : "#c45a72";
            ctx.font = '28px WanWeiHand, "Hannotate SC", "Kaiti SC", "PingFang SC", serif';
            ctx.fillText(sign, -width / 2 + 66, height / 2 - 24);
            drawTape(ctx, -74, -height / 2 - 12, 158, 34, fridgeTheme ? "rgba(135, 205, 229, 0.55)" : marketTheme ? "rgba(255, 147, 112, 0.58)" : "rgba(169, 215, 246, 0.58)");
            ctx.restore();
          });
        }

        function drawCollageLayer(ctx, images, layer) {
          switch (layer.type) {
            case "receipt":
              drawReceipt(ctx, layer.x, layer.y, layer.width, layer.height, layer.angle, layer.text);
              break;
            case "box": {
              const image = images[layer.asset];
              const height = layer.width * ((image.naturalHeight || image.height) / (image.naturalWidth || image.width));
              ctx.save();
              drawSoftShadow(ctx, "rgba(22, 18, 14, 0.22)", 34, 14, 22);
              ctx.drawImage(image, layer.x, layer.y, layer.width, height);
              ctx.restore();
              break;
            }
            case "paper":
              drawPaper(ctx, layer.x, layer.y, layer.width, layer.height, layer.angle, layer.fill, layer.stroke);
              break;
            case "tape":
              drawTapePiece(ctx, layer.x, layer.y, layer.width, layer.height, layer.angle, layer.color);
              break;
            case "sticker":
              drawSticker(ctx, images[layer.asset], layer.x, layer.y, layer.width, layer.angle, layer.shadow ?? true);
              break;
            case "label":
              drawLabel(ctx, layer.text, layer.x, layer.y, layer.width, layer.height, layer.angle, layer.fill, layer.color);
              break;
            case "letterBeads":
              drawLetterBeads(ctx, layer.text, layer.x, layer.y, layer.angle, layer.radius);
              break;
            case "miniCircle":
              drawMiniCircle(ctx, layer.text, layer.x, layer.y, layer.radius, layer.angle, layer.fill, layer.color);
              break;
            case "filmPhoto":
              drawFilmPhoto(ctx, images[layer.asset], layer.x, layer.y, layer.width, layer.height, layer.angle, layer.caption);
              break;
            case "outlinedPhoto":
              drawOutlinedPhoto(ctx, images[layer.asset], layer.x, layer.y, layer.width, layer.height, layer.angle, layer.caption);
              break;
            case "polaroid":
              drawPolaroid(ctx, images[layer.asset], layer.x, layer.y, layer.width, layer.height, layer.angle, layer.caption);
              break;
            case "framedPhoto":
              drawFramedPhoto(ctx, images[layer.asset], images[layer.frame], layer.x, layer.y, layer.frameWidth, layer.angle, layer.windowRect, layer.caption);
              break;
            case "cutoutPhoto":
              drawCutoutPhoto(ctx, images[layer.asset], layer.x, layer.y, layer.width, layer.angle, layer.caption, layer.captionOffsetY || 0);
              break;
            case "note":
              drawChineseNote(ctx, layer.x, layer.y, layer.angle, layer.scale, layer.note);
              break;
          }
        }

        async function makeConfiguredCollageTexture(config) {
          await loadCollageFonts();
          const images = Object.fromEntries(
            await Promise.all(Object.entries(config.assets).map(async ([name, src]) => [name, await loadImage(src)])),
          );

          const canvas = makeCanvas(config.canvas.width, config.canvas.height);
          const ctx = canvas.getContext("2d");
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.imageSmoothingEnabled = true;
          ctx.imageSmoothingQuality = "high";
          config.layers
            .map((layer, index) => ({ layer, index }))
            .sort((a, b) => (a.layer.z ?? a.index) - (b.layer.z ?? b.index) || a.index - b.index)
            .forEach(({ layer }) => drawCollageLayer(ctx, images, layer));

          const texture = new THREE.CanvasTexture(canvas);
          texture.colorSpace = THREE.SRGBColorSpace;
          texture.anisotropy = Math.min(renderer.capabilities.getMaxAnisotropy(), 8);
          texture.needsUpdate = true;
          return texture;
        }

        async function makeFirstTincaseTexture() {
          return makeConfiguredCollageTexture(FIRST_TINCASE_COLLAGE);
        }

        async function makeLibraryCardboardTexture() {
          return makeConfiguredCollageTexture(LIBRARY_CARDBOARD_COLLAGE);
        }

        async function makeFridgeConflictTexture() {
          return makeConfiguredCollageTexture(FRIDGE_CONFLICT_COLLAGE);
        }

        async function makeShoppingCartTexture() {
          return makeConfiguredCollageTexture(SHOPPING_CART_COLLAGE);
        }

        const textureLoader = new THREE.TextureLoader();
        const loadTexture = (asset) => {
          if (asset.collage) {
            const collageFactory = asset.collage === "libraryCardboard" ? makeLibraryCardboardTexture : asset.collage === "foodCart" ? makeShoppingCartTexture : asset.collage === "fridgeConflict" ? makeFridgeConflictTexture : makeFirstTincaseTexture;
            return collageFactory()
              .then((texture) => ({ asset, texture }))
              .catch(() => loadTexture({ ...asset, collage: false }));
          }

          return new Promise((resolve, reject) => {
            textureLoader.load(
              asset.src,
              (texture) => {
                texture.colorSpace = THREE.SRGBColorSpace;
                texture.anisotropy = Math.min(renderer.capabilities.getMaxAnisotropy(), 8);
                resolve({ asset, texture });
              },
              undefined,
              reject,
            );
          });
        };

        function makeTrimmedTexture(texture) {
          const image = texture.image;
          const width = image.naturalWidth || image.width || 1;
          const height = image.naturalHeight || image.height || 1;
          const scan = document.createElement("canvas");
          scan.width = width;
          scan.height = height;
          const scanCtx = scan.getContext("2d", { willReadFrequently: true });
          scanCtx.drawImage(image, 0, 0, width, height);
          const pixels = scanCtx.getImageData(0, 0, width, height).data;
          let minX = width;
          let minY = height;
          let maxX = -1;
          let maxY = -1;

          for (let y = 0; y < height; y += 1) {
            for (let x = 0; x < width; x += 1) {
              if (pixels[(y * width + x) * 4 + 3] > 10) {
                if (x < minX) minX = x;
                if (x > maxX) maxX = x;
                if (y < minY) minY = y;
                if (y > maxY) maxY = y;
              }
            }
          }

          if (maxX < minX || maxY < minY) {
            minX = 0;
            minY = 0;
            maxX = width - 1;
            maxY = height - 1;
          }

          const margin = Math.round(Math.max(maxX - minX, maxY - minY) * 0.035);
          minX = Math.max(0, minX - margin);
          minY = Math.max(0, minY - margin);
          maxX = Math.min(width - 1, maxX + margin);
          maxY = Math.min(height - 1, maxY + margin);

          const cropWidth = maxX - minX + 1;
          const cropHeight = maxY - minY + 1;
          const canvas = document.createElement("canvas");
          canvas.width = cropWidth;
          canvas.height = cropHeight;
          canvas.getContext("2d").drawImage(image, minX, minY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);

          const trimmed = new THREE.CanvasTexture(canvas);
          trimmed.colorSpace = THREE.SRGBColorSpace;
          trimmed.anisotropy = Math.min(renderer.capabilities.getMaxAnisotropy(), 8);
          trimmed.needsUpdate = true;

          return {
            texture: trimmed,
            aspect: cropWidth / cropHeight,
          };
        }

        const requestedBox = Number.parseInt(new URLSearchParams(window.location.search).get("box") || "1", 10);
        const initialBox = Number.isFinite(requestedBox) ? clamp(requestedBox - 1, 0, BOX_ASSETS.length - 1) : 0;
        let target = initialBox;
        let current = initialBox;
        let ringY = 4.05;
        let ringZ = 2.35;
        let baseSize = 1.12;
        let snapTimer = 0;
        let isPointerDown = false;
        let pointerStartY = 0;
        let pointerStartTarget = 0;
        let activeIndex = -1;
        const activeNumber = () => document.getElementById("active-number");

        function exposeState() {
          window.__tincaseState = {
            target,
            current,
            activeIndex,
          };
        }

        function normalizedIndex(value, total) {
          return ((value % total) + total) % total;
        }

        function snapSoon() {
          window.clearTimeout(snapTimer);
          snapTimer = window.setTimeout(() => {
            target = Math.round(target);
            exposeState();
          }, 210);
        }

        function handleWheel(event) {
          event.preventDefault();
          target += clamp(event.deltaY, -80, 80) * 0.0055;
          window.__lastTincaseWheel = event.deltaY;
          exposeState();
          snapSoon();
        }

        window.addEventListener("wheel", handleWheel, { passive: false });

        stage.addEventListener("pointerdown", (event) => {
          isPointerDown = true;
          pointerStartY = event.clientY;
          pointerStartTarget = target;
          stage.setPointerCapture(event.pointerId);
        });

        stage.addEventListener("pointermove", (event) => {
          if (!isPointerDown) return;
          const drag = pointerStartY - event.clientY;
          target = pointerStartTarget + drag / 180;
        });

        stage.addEventListener("pointerup", (event) => {
          isPointerDown = false;
          target = Math.round(target);
          stage.releasePointerCapture(event.pointerId);
        });

        stage.addEventListener("pointercancel", () => {
          isPointerDown = false;
          target = Math.round(target);
        });

        window.addEventListener("keydown", (event) => {
          if (event.key === "ArrowDown" || event.key === "PageDown") {
            target = Math.round(target + 1);
            exposeState();
          }
          if (event.key === "ArrowUp" || event.key === "PageUp") {
            target = Math.round(target - 1);
            exposeState();
          }
        });

        function resize() {
          const width = window.innerWidth;
          const height = window.innerHeight;
          const aspect = width / height;
          renderer.setSize(width, height, false);
          camera.aspect = aspect;
          camera.fov = width < 720 ? 48 : 38;
          camera.position.set(0, 0, width < 720 ? 11.7 : 10.2);
          camera.updateProjectionMatrix();
          ringY = width < 720 ? 4.62 : 5.08;
          ringZ = width < 720 ? 2.05 : 2.45;
          baseSize = width < 720 ? 0.72 : clamp(width / 1400, 0.78, 1);
          loopLine.scale.set(width < 720 ? 0.86 : 1, width < 720 ? 0.9 : 1, width < 720 ? 0.82 : 1);
        }

        window.addEventListener("resize", resize);
        resize();

        Promise.all(BOX_ASSETS.map(loadTexture))
          .then((loaded) => {
            const meshes = loaded.map(({ asset, texture }, index) => {
              const trimmed = makeTrimmedTexture(texture);
              const geometry = new THREE.PlaneGeometry(trimmed.aspect * 2, 2);
              const material = new THREE.MeshBasicMaterial({
                map: trimmed.texture,
                transparent: true,
                alphaTest: 0.025,
                depthTest: false,
                depthWrite: false,
                side: THREE.DoubleSide,
              });
              const mesh = new THREE.Mesh(geometry, material);
              mesh.userData.index = index;
              mesh.userData.boost = asset.boost || 1;
              mesh.renderOrder = 10;
              group.add(mesh);
              return mesh;
            });

            let lastFrame = performance.now();
            const introStart = performance.now();
            const introDuration = 5600;
            const easeOutQuart = (t) => 1 - Math.pow(1 - t, 4);

            function draw(now = performance.now()) {
              requestAnimationFrame(draw);
              const delta = Math.min(0.08, (now - lastFrame) / 1000);
              lastFrame = now;
              current += (target - current) * (1 - Math.exp(-delta * 8.5));
              const introProgress = clamp((now - introStart) / introDuration, 0, 1);
              const introEase = easeOutQuart(introProgress);
              const introSpin = (1 - introEase) * meshes.length * 2;
              const introScale = 0.54 + introEase * 0.46;
              const displayCurrent = current + introSpin;
              const step = (Math.PI * 2) / meshes.length;

              meshes.forEach((mesh, index) => {
                const angle = (index - displayCurrent) * step;
                const front = (Math.cos(angle) + 1) / 2;
                const focus = Math.pow(front, 4.15);
                const x = Math.sin(angle * 1.2) * 0.78;
                const y = -Math.sin(angle) * ringY;
                const z = Math.cos(angle) * ringZ;
                mesh.position.set(x, y, z);
                mesh.rotation.set(0, 0, 0);
                mesh.scale.setScalar(baseSize * introScale * (0.31 + focus * 1.56 * mesh.userData.boost));
                mesh.material.opacity = 0.2 + focus * 0.8;
                mesh.renderOrder = 20 + Math.round(front * 120);
              });

              const nextIndex = normalizedIndex(Math.round(current), meshes.length);
              if (nextIndex !== activeIndex) {
                activeIndex = nextIndex;
                const node = activeNumber();
                if (node) node.textContent = String(activeIndex + 1).padStart(2, "0");
              }
              exposeState();

              loopLine.rotation.x = Math.sin(performance.now() * 0.00022) * 0.018;
              renderer.render(scene, camera);
            }

            draw();
          })
          .catch((error) => {
            console.error("Tincase texture setup failed", error);
            document.body.classList.add("no-three");
          });
      });
    </script>
  </body>
</html>
